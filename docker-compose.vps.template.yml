version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongodb_data:/data/db
    networks:
      - tiptop-net

  api:
    image: ${HARBOR_REGISTRY}/tiptop-${ENV_NAME}/api:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongodb
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${ENV_NAME}-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.${ENV_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${ENV_NAME}-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.${ENV_NAME}-api.loadbalancer.server.port=5000"
    networks:
      - tiptop-net
      - traefik-public

  client:
    image: ${HARBOR_REGISTRY}/tiptop-${ENV_NAME}/client:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${ENV_NAME}-web.rule=Host(`${WEB_HOST}`)"
      - "traefik.http.routers.${ENV_NAME}-web.entrypoints=websecure"
      - "traefik.http.routers.${ENV_NAME}-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.${ENV_NAME}-web.loadbalancer.server.port=80"
    networks:
      - tiptop-net
      - traefik-public

networks:
  tiptop-net:
    driver: bridge
  traefik-public:
    external: true

volumes:
  mongodb_data:
    driver: local
