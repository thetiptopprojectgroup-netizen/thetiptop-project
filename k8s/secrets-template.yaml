# MODÈLE DE SECRETS – NE PAS COMMITER avec de vraies valeurs
# Créer un secret par namespace en remplaçant les valeurs en base64
# Encoder en base64 : echo -n "valeur" | base64

# ─── Secret MongoDB ───────────────────────────────────────────────
# kubectl apply -f ce fichier (après avoir remplacé les valeurs) dans chaque namespace
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: thetiptop-dev  # changer pour thetiptop-preprod / thetiptop-prod
type: Opaque
data:
  root-username: cm9vdA==          # base64("root")
  root-password: cm9vdHBhc3M=     # base64("rootpass") ← CHANGER EN PROD
---
# ─── Secret Backend ───────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: thetiptop-dev  # changer pour thetiptop-preprod / thetiptop-prod
type: Opaque
data:
  # mongodb://thetiptop:thetiptop123@mongodb:27017/thetiptop?authSource=thetiptop
  mongodb-uri: bW9uZ29kYjovL3RoZXRpcHRvcDp0aGV0aXB0b3AxMjNAbW9uZ29kYjoyNzAxNy90aGV0aXB0b3A/YXV0aFNvdXJjZT10aGV0aXB0b3A=
  # base64("your_super_secret_jwt_key") ← CHANGER EN PROD
  jwt-secret: eW91cl9zdXBlcl9zZWNyZXRfand0X2tleQ==
  google-client-id: ""
  google-client-secret: ""
  facebook-app-id: ""
  facebook-app-secret: ""
---
# ─── Secret Harbor (imagePullSecret) ──────────────────────────────
# Créer avec kubectl directement (plus sûr) :
# kubectl create secret docker-registry harbor-secret \
#   --docker-server=harbor.thetiptop-jeu.fr \
#   --docker-username=<HARBOR_USERNAME> \
#   --docker-password=<HARBOR_PASSWORD> \
#   -n thetiptop-dev
# (répéter pour thetiptop-preprod et thetiptop-prod)
