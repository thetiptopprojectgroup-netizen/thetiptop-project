# Job one-shot : lister les snapshots Restic (voir les backups).
# Remplacer NAMESPACE_PLACEHOLDER par thetiptop-dev / thetiptop-preprod / thetiptop-prod.
# Appliquer : sed "s/NAMESPACE_PLACEHOLDER/thetiptop-dev/g" k8s/restic-list-snapshots-job.yaml | kubectl apply -f -
# Puis : kubectl logs job/restic-list-snapshots -n thetiptop-dev -f
apiVersion: batch/v1
kind: Job
metadata:
  name: restic-list-snapshots
  namespace: NAMESPACE_PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restic
          image: restic/restic:0.16.4
          command: ["restic", "snapshots", "-v"]
          env:
            - name: RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: restic-repository
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: restic-password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: secret-access-key
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
