# Backup MongoDB : mongodump puis upload vers DO Spaces via AWS CLI (s3 sync).
# 18h00 FR (17h00 UTC) + 18h15 UTC. Secret : restic-s3-secret (access-key-id, secret-access-key, endpoint-url, s3-uri).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  namespace: NAMESPACE_PLACEHOLDER
spec:
  schedule: "SCHEDULE_PLACEHOLDER"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: mongodump
              image: mongo:7.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/$(date +%Y-%m-%d_%H%M%S)"
                  mkdir -p "$BACKUP_DIR"
                  mongodump \
                    --uri="mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin" \
                    --out="$BACKUP_DIR" \
                    --gzip
                  echo "Backup dump terminé: $BACKUP_DIR"
              env:
                - name: MONGO_INITDB_ROOT_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-secret
                      key: root-username
                - name: MONGO_INITDB_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-secret
                      key: root-password
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits: { cpu: 500m, memory: 512Mi }
          containers:
            - name: s3-upload
              image: amazon/aws-cli:2.15
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  SUFFIX=$(date +%Y-%m-%d_%H%M%S)
                  echo "Upload vers $S3_URI/$SUFFIX ..."
                  aws s3 sync /backup "$S3_URI/$SUFFIX/" --endpoint-url "$AWS_ENDPOINT_URL"
                  echo "Upload terminé."
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: secret-access-key
                - name: AWS_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: endpoint-url
                - name: S3_URI
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: s3-uri
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits: { cpu: 500m, memory: 512Mi }
          volumes:
            - name: backup
              emptyDir: {}
---
