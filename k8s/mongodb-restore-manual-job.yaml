# Job de restauration manuelle : restic restore latest → mongorestore vers MongoDB.
# Usage : adapter NAMESPACE_PLACEHOLDER puis kubectl apply -f k8s/mongodb-restore-manual-job.yaml -n <namespace>
# Ou : sed 's/NAMESPACE_PLACEHOLDER/thetiptop-prod/' k8s/mongodb-restore-manual-job.yaml | kubectl apply -f -
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-restore-manual
  namespace: NAMESPACE_PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: restic-restore
          image: restic/restic:0.16
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Restauration du dernier snapshot Restic vers /restore..."
              restic restore latest --target /restore
              echo "Restauration Restic terminée."
          env:
            - name: RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: restic-repository
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: restic-password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: restic-s3-secret
                  key: secret-access-key
          volumeMounts:
            - name: restore
              mountPath: /restore
      containers:
        - name: mongorestore
          image: mongo:7.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Restic restore met le contenu sous /restore/<date_folder>/ (ex. admin/, thetiptop/, ...)
              DIR=$(find /restore -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -1)
              if [ -z "$DIR" ]; then
                echo "Aucun dossier de backup trouvé sous /restore"
                exit 1
              fi
              echo "Restauration MongoDB depuis $DIR..."
              mongorestore --uri="mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin" --gzip --drop "$DIR"
              echo "Restauration MongoDB terminée."
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-password
          volumeMounts:
            - name: restore
              mountPath: /restore
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: 1000m, memory: 1Gi }
      volumes:
        - name: restore
          emptyDir: {}
