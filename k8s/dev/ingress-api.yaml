# Ingress dédié /api avec priorité haute pour que Traefik route vers le backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thetiptop-ingress-api
  namespace: thetiptop-dev
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: traefik-security-headers@kubernetescrd
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  tls:
    - hosts:
        - dev.thetiptop-jeu.fr
      secretName: thetiptop-dev-tls
  rules:
    - host: dev.thetiptop-jeu.fr
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
