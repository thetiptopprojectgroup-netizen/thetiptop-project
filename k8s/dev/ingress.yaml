# Ingress – Cluster DEV
# Domaines : dev.thetiptop-jeu.fr (frontend) + api.dev.thetiptop-jeu.fr (backend)
# TLS automatique via cert-manager + Let's Encrypt

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thetiptop-ingress
  namespace: thetiptop-dev
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: traefik-security-headers@kubernetescrd
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - dev.thetiptop-jeu.fr
        - api.dev.thetiptop-jeu.fr
      secretName: thetiptop-dev-tls
  rules:
    # Frontend (/) ; /api est géré par ingress-api.yaml (priorité 100)
    - host: dev.thetiptop-jeu.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    # ─── Backend API (sous-domaine dédié) ───────────────────────────────
    - host: api.dev.thetiptop-jeu.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
