apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: thetiptop-preprod
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: thetiptop-preprod
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        env: preprod
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "thetiptop-thetiptop-preprod"
        vault.hashicorp.com/agent-inject-secret-mongodb-username: "secret/data/thetiptop/preprod/mongodb"
        vault.hashicorp.com/agent-inject-template-mongodb-username: '{{ with secret "secret/data/thetiptop/preprod/mongodb" }}{{ .Data.data["root-username"] }}{{ end }}'
        vault.hashicorp.com/agent-inject-secret-mongodb-password: "secret/data/thetiptop/preprod/mongodb"
        vault.hashicorp.com/agent-inject-template-mongodb-password: '{{ with secret "secret/data/thetiptop/preprod/mongodb" }}{{ .Data.data["root-password"] }}{{ end }}'
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          command:
            - /bin/sh
            - -ec
            - |
              export MONGO_INITDB_ROOT_USERNAME=$(cat /vault/secrets/mongodb-username 2>/dev/null || echo "$MONGO_INITDB_ROOT_USERNAME")
              export MONGO_INITDB_ROOT_PASSWORD=$(cat /vault/secrets/mongodb-password 2>/dev/null || echo "$MONGO_INITDB_ROOT_PASSWORD")
              exec docker-entrypoint.sh mongod
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-password
            - name: MONGO_INITDB_DATABASE
              value: thetiptop
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          # Startup : on laisse jusqu'à ~5 min à MongoDB pour ouvrir le port (PVC lent, premier démarrage).
          startupProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          # Readiness : exec avec mongosh pour être sûr que MongoDB accepte les connexions (pas seulement le port ouvert).
          # tcpSocket seul peut réussir alors que l'auth n'est pas prête, ou échouer selon le réseau ; mongosh ping est fiable.
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin" --eval "db.adminCommand(\"ping\")" --quiet'
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
