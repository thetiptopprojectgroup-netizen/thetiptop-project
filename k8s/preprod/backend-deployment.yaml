apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: thetiptop-preprod
  labels:
    app: backend
    env: preprod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        env: preprod
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "thetiptop-thetiptop-preprod"
        vault.hashicorp.com/agent-inject-secret-backend: "secret/data/thetiptop/preprod/backend"
        vault.hashicorp.com/agent-inject-template-backend: |
          MONGODB_URI={{ with secret "secret/data/thetiptop/preprod/backend" }}{{ .Data.data["mongodb-uri"] }}{{ end }}
          JWT_SECRET={{ with secret "secret/data/thetiptop/preprod/backend" }}{{ .Data.data["jwt-secret"] }}{{ end }}
          GOOGLE_CLIENT_ID={{ with secret "secret/data/thetiptop/preprod/backend" }}{{ or .Data.data["google-client-id"] "" }}{{ end }}
          GOOGLE_CLIENT_SECRET={{ with secret "secret/data/thetiptop/preprod/backend" }}{{ or .Data.data["google-client-secret"] "" }}{{ end }}
    spec:
      containers:
        - name: backend
          image: HARBOR_REGISTRY/thetiptop-preprod/backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: staging
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-secret
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: client-url
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: backend-url
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: google-client-id
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: google-client-secret
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
      imagePullSecrets:
        - name: harbor-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: thetiptop-preprod
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
