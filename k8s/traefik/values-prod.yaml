# Helm values – Traefik Ingress Controller – Cluster PROD
# Compatible Traefik Helm chart v3.x

deployment:
  replicas: 2

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-name: "traefik-prod"
    service.beta.kubernetes.io/do-loadbalancer-size-slug: "lb-small"

additionalArguments:
  - "--entrypoints.web.http.redirections.entrypoint.to=:443"
  - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
  - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

ingressRoute:
  dashboard:
    enabled: false

logs:
  general:
    level: WARN
  access:
    enabled: true

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
