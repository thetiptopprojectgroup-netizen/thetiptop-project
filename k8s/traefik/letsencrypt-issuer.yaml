# ClusterIssuer Let's Encrypt via cert-manager
# Appliquer dans chaque cluster : kubectl apply -f k8s/traefik/letsencrypt-issuer.yaml
# Remplacer YOUR_EMAIL par votre email avant d'appliquer.

# ─── Staging (pour tester sans quota) ─────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: contact@thetiptop-jeu.fr      # ← CHANGER
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
# ─── Production (certificats réels) ───────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: contact@thetiptop-jeu.fr      # ← CHANGER
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
