# MinIO accessible via URL (un hostname par cluster pour que Let's Encrypt puisse émettre le certificat).
# Remplacer MINIO_HOST_PLACEHOLDER par le CD : minio.dev.thetiptop-jeu.fr (dev), minio.preprod... (preprod), minio.thetiptop-jeu.fr (prod).
# TLS via cert-manager (Let's Encrypt). Entrypoint websecure pour utiliser le certificat.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-ingress
  namespace: minio
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - MINIO_HOST_PLACEHOLDER
      secretName: minio-tls
  rules:
    - host: MINIO_HOST_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
