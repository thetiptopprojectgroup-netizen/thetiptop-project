# Nginx devant MinIO : corrige les redirections qui contiennent un port (ex. :41011)
# en les réécrivant sans port (HTTPS standard 443).
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-nginx-config
  namespace: minio
data:
  default.conf: |
    server {
      listen 80;
      location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port "443";
        proxy_buffering off;
        proxy_redirect ~^https://([^/]+):\d+(/.*)?$ https://$1$2;
        proxy_redirect ~^http://([^/]+):\d+(/.*)?$ http://$1$2;
      }
    }
