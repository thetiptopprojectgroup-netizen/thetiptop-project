# Nginx : / → console MinIO (9001), /api → API MinIO (9000). Connexion possible comme Harbor.
# L’API S3 (Restic) utilise http://minio.minio.svc.cluster.local:9000 en cluster.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-nginx-config
  namespace: minio
data:
  default.conf: |
    server {
      listen 80;
      # API MinIO sous /api (la console appelle cette URL depuis le navigateur)
      location /api/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port "443";
        proxy_buffering off;
      }
      # Console MinIO (login + interface) sur /
      location / {
        proxy_pass http://127.0.0.1:9001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port "443";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        chunked_transfer_encoding off;
      }
    }
