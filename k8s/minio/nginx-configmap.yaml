# Nginx devant MinIO : réécrit les redirections (Location) pour enlever le port
# (ex. https://minio.dev...:41011/ → https://minio.dev.../) et évite boucle / timeout.
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-nginx-config
  namespace: minio
data:
  default.conf: |
    server {
      listen 80;
      location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port "443";
        proxy_buffering off;
        # Enlever le port des redirections (ex. :41011)
        proxy_redirect ~^https://([^:]+):\d+(/.*)?$ https://$1$2;
        proxy_redirect ~^http://([^:]+):\d+(/.*)?$ http://$1$2;
        # Forcer HTTPS dans Location si MinIO renvoie http://
        proxy_redirect ~^http://([^/]+)(/.*)?$ https://$1$2;
      }
    }
