# Nginx devant MinIO : page d’info à la racine (plus de proxy vers MinIO sur /) → plus de boucle 307.
# L’API S3 (Restic) utilise directement minio:9000 en cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-nginx-config
  namespace: minio
data:
  default.conf: |
    server {
      listen 80;
      root /etc/nginx/conf.d;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>MinIO – Backups</title>
      <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #333; }
        p { color: #666; line-height: 1.5; }
        code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 4px; }
      </style>
    </head>
    <body>
      <h1>MinIO – Backups</h1>
      <p>Le stockage S3 (MinIO) est actif. Les backups MongoDB (Restic) utilisent l’API en interne.</p>
      <p>Pour lister les buckets ou les objets, utilisez le client <code>mc</code> ou l’API S3 (credentials = identifiants MinIO).</p>
      <p>Vérifications dans le cluster&nbsp;: <code>kubectl get cronjobs -n thetiptop-dev</code>, <code>kubectl logs job/backup-manual -n thetiptop-dev</code>.</p>
    </body>
    </html>
