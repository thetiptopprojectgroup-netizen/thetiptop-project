# Pour MinIO derrière Traefik : forcer port 443 et HTTPS dans les headers
# afin d'éviter boucle de redirection et URL avec mauvais port (ex. :42215).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: minio-forwarded-headers
  namespace: minio
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Port: "443"
      X-Forwarded-Proto: "https"
