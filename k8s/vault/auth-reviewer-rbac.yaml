# ServiceAccount utilisé par le Job de bootstrap Vault pour configurer auth/kubernetes.
# Ce SA doit pouvoir créer des TokenReview (auth.k8s.io) pour que Vault valide les JWT des Pods.
# Appliquer : kubectl apply -f k8s/vault/auth-reviewer-rbac.yaml -n vault
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth-reviewer
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-auth-reviewer
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-auth-reviewer
subjects:
  - kind: ServiceAccount
    name: vault-auth-reviewer
    namespace: vault
