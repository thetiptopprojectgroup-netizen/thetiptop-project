# CronJob optionnel : redémarre backend (et optionnellement MongoDB) pour prendre en compte
# les secrets mis à jour dans Vault. À déployer dans chaque namespace (thetiptop-dev, etc.).
# Les valeurs des secrets sont mises à jour via le CD (push avec nouveaux GitHub Secrets) ou manuellement dans Vault.
# Planification : 1er du mois à 4h00 (UTC) par défaut.
# Remplacer NAMESPACE_PLACEHOLDER par thetiptop-dev / thetiptop-preprod / thetiptop-prod.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-rotation-sa
  namespace: NAMESPACE_PLACEHOLDER
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-secrets-rotation-restart
  namespace: NAMESPACE_PLACEHOLDER
spec:
  schedule: "0 4 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: vault-rotation-sa
          containers:
            - name: rollout-restart
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  kubectl rollout restart deployment/backend -n "$NAMESPACE" || true
                  # Décommenter pour redémarrer aussi MongoDB après rotation du mot de passe :
                  # kubectl rollout restart statefulset/mongodb -n "$NAMESPACE" || true
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
---
# RBAC minimal pour que le CronJob puisse faire rollout restart (dans le même namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-rotation-restart
  namespace: NAMESPACE_PLACEHOLDER
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "patch", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-rotation-restart
  namespace: NAMESPACE_PLACEHOLDER
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-rotation-restart
subjects:
  - kind: ServiceAccount
    name: vault-rotation-sa
    namespace: NAMESPACE_PLACEHOLDER
