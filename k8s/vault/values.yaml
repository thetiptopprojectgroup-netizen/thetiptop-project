# Vault Helm – cluster HA avec Raft + Injector + audit
# Installation : helm repo add hashicorp https://helm.releases.hashicorp.com && helm upgrade --install vault hashicorp/vault -n vault -f k8s/vault/values.yaml
# Après install : init + unseal sur vault-0 (voir .github/VAULT-SETUP.md)

global:
  enabled: true
  tlsDisable: true

server:
  enabled: true
  replicas: 3
  ha:
    enabled: true
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address     = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "raft" {
          path = "/vault/data"
        }
  auditStorage:
    enabled: true
    size: 2Gi
    mountPath: /vault/audit
  resources:
    requests:
      memory: "256Mi"
      cpu: "128m"
    limits:
      memory: "512Mi"
      cpu: "500m"

injector:
  enabled: true
  # N'injecte que dans les namespaces avec le label vault-injection=enabled
  # Sans ce label, les pods utilisent les secrets K8s (secretKeyRef) → déploiement fonctionne sans Vault
  webhook:
    namespaceSelector:
      matchLabels:
        vault-injection: enabled
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
