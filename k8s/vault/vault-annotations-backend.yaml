# Snippet d'annotations Vault Agent Injector pour le backend.
# À fusionner dans le template du Deployment backend (metadata.annotations du pod).
# Remplacer ENV_VAULT par dev, preprod ou prod selon l'environnement.
#
# Ces annotations injectent les secrets depuis Vault (secret/data/thetiptop/<env>/backend)
# dans le fichier /vault/secrets/backend au format .env (chargé par le backend au démarrage).
vault.hashicorp.com/agent-inject: "true"
vault.hashicorp.com/role: "thetiptop-NAMESPACE_PLACEHOLDER"
vault.hashicorp.com/agent-inject-secret-backend: "secret/data/thetiptop/ENV_VAULT_PLACEHOLDER/backend"
vault.hashicorp.com/agent-inject-template-backend: |
  MONGODB_URI={{ with secret "secret/data/thetiptop/ENV_VAULT_PLACEHOLDER/backend" }}{{ .Data.data["mongodb-uri"] }}{{ end }}
  JWT_SECRET={{ with secret "secret/data/thetiptop/ENV_VAULT_PLACEHOLDER/backend" }}{{ .Data.data["jwt-secret"] }}{{ end }}
  GOOGLE_CLIENT_ID={{ with secret "secret/data/thetiptop/ENV_VAULT_PLACEHOLDER/backend" }}{{ or .Data.data["google-client-id"] "" }}{{ end }}
  GOOGLE_CLIENT_SECRET={{ with secret "secret/data/thetiptop/ENV_VAULT_PLACEHOLDER/backend" }}{{ or .Data.data["google-client-secret"] "" }}{{ end }}
