# Même technique qu'en dev : création admin/employés uniquement (rapide).
# On attend la fin de ce job avant de continuer le déploiement.
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-admin
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: seed-admin
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: seed-admin
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: seed-admin
          image: BACKEND_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command: ["npm", "run", "seed:admin"]
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: mongodb-uri
            - name: ADMIN_EMAIL
              value: "ADMIN_EMAIL_PLACEHOLDER"
            - name: ADMIN_PASSWORD
              value: "ADMIN_PASSWORD_PLACEHOLDER"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
