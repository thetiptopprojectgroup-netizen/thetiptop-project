apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: thetiptop-prod
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: thetiptop-prod
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        env: prod
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "thetiptop-thetiptop-prod"
        vault.hashicorp.com/agent-inject-secret-mongodb-username: "secret/data/thetiptop/prod/mongodb"
        vault.hashicorp.com/agent-inject-template-mongodb-username: '{{ with secret "secret/data/thetiptop/prod/mongodb" }}{{ .Data.data["root-username"] }}{{ end }}'
        vault.hashicorp.com/agent-inject-secret-mongodb-password: "secret/data/thetiptop/prod/mongodb"
        vault.hashicorp.com/agent-inject-template-mongodb-password: '{{ with secret "secret/data/thetiptop/prod/mongodb" }}{{ .Data.data["root-password"] }}{{ end }}'
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          command:
            - /bin/sh
            - -ec
            - |
              export MONGO_INITDB_ROOT_USERNAME=$(cat /vault/secrets/mongodb-username 2>/dev/null || echo "$MONGO_INITDB_ROOT_USERNAME")
              export MONGO_INITDB_ROOT_PASSWORD=$(cat /vault/secrets/mongodb-password 2>/dev/null || echo "$MONGO_INITDB_ROOT_PASSWORD")
              exec docker-entrypoint.sh mongod
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-password
            - name: MONGO_INITDB_DATABASE
              value: thetiptop
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
