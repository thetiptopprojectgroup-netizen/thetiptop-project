# Test de restauration régulier : vérifie que le repo Restic est lisible et qu'un snapshot peut être restauré.
# Planifié chaque dimanche à 6h00 UTC. Utilise le même secret restic-s3-secret.
# Ne restaure pas dans MongoDB, seulement vérifie restic restore vers un volume temporaire.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-restore-test
  namespace: NAMESPACE_PLACEHOLDER
spec:
  schedule: "0 6 * * 0"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: restic-restore-test
              image: restic/restic:0.16
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Liste des snapshots Restic ==="
                  restic snapshots
                  echo ""
                  echo "=== Restauration du dernier snapshot vers /verify ==="
                  restic restore latest --target /verify
                  echo ""
                  echo "=== Contenu restauré (premiers fichiers) ==="
                  find /verify -type f | head -20
                  echo "Test de restauration OK."
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: restic-repository
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: restic-password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: secret-access-key
              volumeMounts:
                - name: verify
                  mountPath: /verify
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: 200m, memory: 256Mi }
          volumes:
            - name: verify
              emptyDir: {}
