# Test de restauration mensuel en sandbox : 1er de chaque mois à 6h UTC.
# Restaure le dernier snapshot dans un volume temporaire (ne modifie pas la base prod).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-restore-test
  namespace: NAMESPACE_PLACEHOLDER
spec:
  schedule: "0 6 1 * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: restic-restore-test
              image: restic/restic:0.16.4
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Snapshots disponibles ==="
                  restic snapshots
                  echo "=== Restauration sandbox (volume temporaire) ==="
                  restic restore latest --target /verify
                  echo "=== Aperçu fichiers restaurés ==="
                  find /verify -type f | head -30
                  echo "Test de restauration mensuel OK."
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: restic-repository
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: restic-password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: restic-s3-secret
                      key: secret-access-key
              volumeMounts:
                - name: verify
                  mountPath: /verify
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: 200m, memory: 256Mi }
          volumes:
            - name: verify
              emptyDir: {}
