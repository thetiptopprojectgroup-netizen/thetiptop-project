# Values Helm – Stack Prometheus + Grafana + Alertmanager – ENVIRONNEMENT PROD
# Chart : prometheus-community/kube-prometheus-stack
# Usage : helm upgrade --install monitoring prometheus-community/kube-prometheus-stack -n monitoring -f k8s/monitoring/values-prod.yaml
# IMPORTANT : définir le mot de passe Grafana via secret ou --set grafana.adminPassword=xxx

# ─── Prometheus ─────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 45d
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        memory: 2Gi
  service:
    type: ClusterIP

# ─── Grafana ───────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "CHANGE_ME_PROD"   # OBLIGATOIRE : remplacer par un mot de passe fort (ou utiliser existingSecret)
  persistence:
    enabled: true
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - grafana.thetiptop-jeu.fr
    tls:
      - secretName: grafana-prod-tls
        hosts:
          - grafana.thetiptop-jeu.fr
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# ─── Alertmanager ───────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 30m
        memory: 64Mi
      limits:
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'null'
      routes: []
    receivers:
      - name: 'null'

# ─── Ressources prod ────────────────────────────────────────────────────────
kube-state-metrics:
  resources:
    requests:
      cpu: 30m
      memory: 128Mi
    limits:
      memory: 256Mi

nodeExporter:
  enabled: true

defaultRules:
  create: true
