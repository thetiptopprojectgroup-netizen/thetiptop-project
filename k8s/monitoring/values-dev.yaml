# Values Helm – Stack Prometheus + Grafana + Alertmanager – ENVIRONNEMENT DEV
# Chart : prometheus-community/kube-prometheus-stack
# Usage : helm upgrade --install monitoring prometheus-community/kube-prometheus-stack -n monitoring -f k8s/monitoring/values-dev.yaml

# ─── Prometheus ─────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
      limits:
        memory: 1Gi
  service:
    type: ClusterIP

# ─── Grafana ───────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "admin"   # À CHANGER en prod ; en dev OK pour tester
  persistence:
    enabled: true
    size: 2Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - grafana.dev.thetiptop-jeu.fr
    tls:
      - secretName: grafana-dev-tls
        hosts:
          - grafana.dev.thetiptop-jeu.fr
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# ─── Alertmanager ───────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'null'
      routes: []
    receivers:
      - name: 'null'

# ─── Réduction des ressources en dev (optionnel) ───────────────────────────
kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

nodeExporter:
  enabled: true

defaultRules:
  create: true
