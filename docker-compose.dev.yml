version: '3.8'

# Docker Compose simplifié pour développement Windows
# Usage: docker-compose -f docker-compose.dev.yml up -d

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: thetiptop-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: thetiptop
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - thetiptop-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Backend API (Node.js + Express)
  api:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: thetiptop-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://thetiptop:thetiptop123@mongodb:27017/thetiptop?authSource=thetiptop
      JWT_SECRET: dev_secret_key_change_in_production_2024
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      CONTEST_START_DATE: "2024-01-01"
      CONTEST_END_DATE: "2030-12-31"
      CLAIM_END_DATE: "2031-01-31"
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - thetiptop-network
    volumes:
      - ./server/src:/app/src:ro

  # Frontend (React + Vite)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: thetiptop-client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - thetiptop-network
    volumes:
      - ./client/src:/app/src:ro

networks:
  thetiptop-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
