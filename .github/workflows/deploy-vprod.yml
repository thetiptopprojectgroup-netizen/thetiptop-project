# -----------------------------------------------------------------------------
# CD — Branche vprod (prod) — push `vprod` + attente CI Monorepo verte, ou manuel.
# L'environnement GitHub protège le job de déploiement.
# Secret multiligne : VPROD_ENV_FILE (contenu de infra/deploy/env/vprod.env)
# -----------------------------------------------------------------------------
name: CD / vprod

on:
  push:
    branches: [vprod]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  deployments: write

concurrency:
  group: deploy-vprod
  cancel-in-progress: false

env:
  HARBOR_PROJECT: vprod
  VITE_API_URL: https://dsp5-archi-o22a-15m-g3.fr/api
  SITE_URL: https://dsp5-archi-o22a-15m-g3.fr

jobs:
  gate:
    name: "0 · CI Monorepo verte sur ce commit (ou manuel)"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.gate.outputs.sha }}
      ok: ${{ steps.gate.outputs.ok }}
    steps:
      - name: Vérifier / attendre la CI
        id: gate
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ciName = 'CI — Monorepo (server + client)';
            const target = 'vprod';
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('sha', context.sha);
              core.setOutput('ok', 'true');
              core.info('Déploiement manuel : pas d’attente CI.');
              return;
            }
            const sha = context.sha;
            const branch = context.ref.replace(/^refs\/heads\//, '');
            if (branch !== target) {
              core.setOutput('sha', '');
              core.setOutput('ok', 'false');
              return;
            }
            core.info(`Attente CI « ${ciName} » verte pour ${sha.slice(0, 7)}…`);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxAttempts = 90;
            const delayMs = 10000;
            for (let i = 0; i < maxAttempts; i++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: sha,
                per_page: 30,
              });
              const relevant = (data.workflow_runs || []).filter(
                (w) =>
                  w.name === ciName &&
                  w.head_branch === target &&
                  (w.event === 'push' || w.event === 'pull_request')
              );
              if (relevant.length === 0) {
                core.info(`Run CI pas encore visible (tentative ${i + 1}/${maxAttempts})`);
                await new Promise((r) => setTimeout(r, delayMs));
                continue;
              }
              const pending = relevant.filter((w) => w.status !== 'completed');
              if (pending.length > 0) {
                core.info(
                  `CI en cours : ${pending.map((p) => `${p.event}:${p.status}`).join(', ')} (tentative ${i + 1}/${maxAttempts})`
                );
                await new Promise((r) => setTimeout(r, delayMs));
                continue;
              }
              const okRun = relevant.find((w) => w.conclusion === 'success');
              if (okRun) {
                core.setOutput('sha', sha);
                core.setOutput('ok', 'true');
                return;
              }
              const worst = relevant.find((w) => w.conclusion && w.conclusion !== 'skipped') || relevant[0];
              core.setOutput('sha', sha);
              core.setOutput('ok', 'false');
              core.setFailed(`CI Monorepo en échec (${worst.conclusion}) — déploiement annulé.`);
              return;
            }
            core.setOutput('sha', '');
            core.setOutput('ok', 'false');
            core.setFailed('Timeout : la CI Monorepo n’a pas fini à temps — déploiement annulé.');

  harbor-project:
    name: "1 · Harbor — projet vprod"
    needs: [gate]
    if: needs.gate.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ needs.gate.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Créer le projet s'il n'existe pas
        env:
          HARBOR_URL: https://${{ secrets.HARBOR_REGISTRY_BASE }}
          HARBOR_ADMIN_USER: ${{ secrets.HARBOR_ADMIN_USER }}
          HARBOR_ADMIN_PASSWORD: ${{ secrets.HARBOR_ADMIN_PASSWORD }}
          HARBOR_PROJECT_NAME: ${{ env.HARBOR_PROJECT }}
        run: bash infra/scripts/ensure-harbor-project.sh

  build-and-push:
    name: "2 · Registry — build & push images"
    needs: [harbor-project]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      sha: ${{ needs.harbor-project.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.harbor-project.outputs.sha }}

      - name: Docker login (robot)
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          LOGIN_SERVER="${REGISTRY%%/*}"
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "${LOGIN_SERVER}" \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build & push API
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          SHA="${{ needs.harbor-project.outputs.sha }}"
          docker build -t "${REGISTRY}/api:${SHA}" -f server/Dockerfile server
          docker push "${REGISTRY}/api:${SHA}"

      - name: Build & push client
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          SHA: ${{ needs.harbor-project.outputs.sha }}
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          LASTMOD_DATE="$(git log -1 --format=%cs)"
          docker build \
            --target production \
            --build-arg VITE_API_URL="${{ env.VITE_API_URL }}" \
            --build-arg SITE_URL="${{ env.SITE_URL }}" \
            --build-arg LASTMOD_DATE="${LASTMOD_DATE}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID}" \
            -t "${REGISTRY}/client:${SHA}" \
            -f client/Dockerfile client
          docker push "${REGISTRY}/client:${SHA}"

  deploy-vps:
    name: "3 · VPS — rsync & docker compose (prod)"
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ vars.PRODUCTION_ENVIRONMENT }}
      url: https://dsp5-archi-o22a-15m-g3.fr
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-and-push.outputs.sha }}

      - name: Écrire vprod.env sur le VPS + sync + compose
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPROD_ENV_FILE: ${{ secrets.VPROD_ENV_FILE || secrets.VPROD_ENV }}
          VPROD_ENV_FILE_B64: ${{ secrets.VPROD_ENV_FILE_B64 }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_REGISTRY_HOST_RAW: ${{ secrets.HARBOR_REGISTRY_BASE }}
        run: |
          set -euo pipefail
          if [ -n "${VPROD_ENV_FILE_B64:-}" ]; then
            CONTENT="$(printf '%s' "$VPROD_ENV_FILE_B64" | base64 -d)"
          elif [ -n "${VPROD_ENV_FILE:-}" ]; then
            CONTENT="$VPROD_ENV_FILE"
          else
            echo "::error::Secret VPROD_ENV_FILE (ou VPROD_ENV / VPROD_ENV_FILE_B64) manquant. Collez le contenu de vprod.env dans un secret de dépôt."
            exit 1
          fi
          CONTENT="$(printf '%s' "$CONTENT" | tr -d '\r')"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          REMOTE="${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}"
          SSH_BASE=(ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes)
          "${SSH_BASE[@]}" "$REMOTE" "mkdir -p /opt/thetiptop/app/infra/deploy/env"
          printf '%s\n' "$CONTENT" | "${SSH_BASE[@]}" "$REMOTE" "cat > /opt/thetiptop/app/infra/deploy/env/vprod.env"
          "${SSH_BASE[@]}" "$REMOTE" "chmod 600 /opt/thetiptop/app/infra/deploy/env/vprod.env"
          RSYNC_SSH='ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes'
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'client/node_modules' \
            --exclude 'server/node_modules' \
            --exclude 'infra/deploy/env/*.env' \
            -e "$RSYNC_SSH" \
            ./ "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}:/opt/thetiptop/app/"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST_RAW#https://}"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST#http://}"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST%%/*}"
          printf '%s\n' "$HARBOR_PASSWORD" | "${SSH_BASE[@]}" "$REMOTE" \
            "docker login \"$HARBOR_REGISTRY_HOST\" -u \"$HARBOR_USERNAME\" --password-stdin"
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail
             cd /opt/thetiptop/app
             export REGISTRY='${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}'
             export IMAGE_TAG='${{ needs.build-and-push.outputs.sha }}'
             docker compose -f infra/deploy/docker-compose.stack.yml \
               --env-file infra/deploy/env/vprod.env \
               up -d --remove-orphans
             bash infra/deploy/seed-app-users.sh /opt/thetiptop/app infra/deploy/env/vprod.env
             bash infra/deploy/apply-traefik-minio-from-app.sh /opt/thetiptop/app"

      - name: Restic — crons (Ansible depuis le runner)
        run: bash infra/deploy/run-ansible-restic.sh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
