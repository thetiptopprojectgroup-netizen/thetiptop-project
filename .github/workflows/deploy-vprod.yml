# Déploiement **manuel** seul. Push normal : `ci-pipeline.yml`.
# -----------------------------------------------------------------------------
name: CD / vprod

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  deployments: write

concurrency:
  group: deploy-vprod-manual
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-vprod-reusable.yml
    secrets: inherit
    with:
      commit_sha: ${{ github.sha }}
