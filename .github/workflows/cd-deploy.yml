# Déploiement automatique vers les 3 clusters Kubernetes après validation des 2 CI.
# Architecture : 3 clusters distincts (un par environnement dev / preprod / prod).
#
# Secrets GitHub requis :
#   KUBECONFIG_DEV      – kubeconfig base64 du cluster dev
#   KUBECONFIG_PREPROD  – kubeconfig base64 du cluster preprod
#   KUBECONFIG_PROD     – kubeconfig base64 du cluster prod
#   MONGODB_URI_DEV / MONGODB_URI_PREPROD / MONGODB_URI_PROD
#   JWT_SECRET_DEV / JWT_SECRET_PREPROD / JWT_SECRET_PROD
#   MONGO_ROOT_USERNAME / MONGO_ROOT_PASSWORD (ou par env)
#   HARBOR_REGISTRY / HARBOR_USERNAME / HARBOR_PASSWORD (déjà configurés)
#
# Encoder un kubeconfig : base64 -w0 ~/.kube/config-<env>
name: CD - Deploy (Kubernetes)

on:
  push:
    branches:
      - dev
      - preprod
      - prod
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer le déploiement même si les CI ne sont pas vérifiées'
        required: false
        default: 'false'
      fix_tls_prod:
        description: "Réinitialiser le certificat TLS en prod (une fois, pour corriger ERR_CERT_AUTHORITY_INVALID)"
        required: false
        default: 'false'

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Déploiement → ${{ github.ref_name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 1. Vérifier les 2 CI (sauf si force=true) ─────────────────
      - name: Vérifier que les 2 CI sont vertes pour ce commit
        id: ci-check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const force = '${{ github.event.inputs.force }}' === 'true';
            if (force) {
              core.info('⚠️ Déploiement forcé : vérification CI ignorée.');
              core.setOutput('skip', 'false');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const head_sha = context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;

            const { data: { workflows } } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const serverCi = workflows.find(w => w.name === 'CI - Server (Backend)');
            const clientCi = workflows.find(w => w.name === 'CI - Client (Frontend)');
            if (!serverCi || !clientCi) {
              core.info('Workflows CI introuvables – déploiement skippé.');
              core.setOutput('skip', 'true');
              return;
            }

            const getRuns = async (id) => {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                workflow_id: id,
                branch,
                per_page: 20
              });
              return data.workflow_runs || [];
            };

            async function getCiStatus() {
              const [sRuns, cRuns] = await Promise.all([getRuns(serverCi.id), getRuns(clientCi.id)]);
              const sRun = sRuns.find(r => r.head_sha === head_sha);
              const cRun = cRuns.find(r => r.head_sha === head_sha);

              const sStatus = sRun ? (sRun.status === 'completed' ? sRun.conclusion : sRun.status) : 'absent';
              const cStatus = cRun ? (cRun.status === 'completed' ? cRun.conclusion : cRun.status) : 'absent';
              core.info(`CI Server: ${sStatus} | CI Client: ${cStatus}`);

              return { sRun, cRun };
            }

            // Si déclenché par un push, on ATTEND que les 2 CI soient terminées (max 10 tentatives = ~5 min)
            if (eventName === 'push') {
              const maxAttempts = 10; // 10 * 30s = 5 minutes max
              const delayMs = 30000;

              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                const { sRun, cRun } = await getCiStatus();

                if (sRun?.conclusion === 'failure' || cRun?.conclusion === 'failure') {
                  core.setFailed('CI en échec – déploiement annulé.');
                  return;
                }

                if (sRun?.conclusion === 'success' && cRun?.conclusion === 'success') {
                  core.info('✅ Les 2 CI sont vertes – déploiement autorisé.');
                  core.setOutput('skip', 'false');
                  return;
                }

                core.info(`Les CI ne sont pas encore terminées (essai ${attempt}/${maxAttempts}). Nouvelle vérification dans 30s...`);
                await new Promise(res => setTimeout(res, delayMs));
              }

              // Après 10 tentatives : on exécute quand même tout le déploiement (sans skip)
              core.info('⏱️ Timeout après 10 tentatives : les 2 CI ne sont pas encore vertes – déploiement exécuté quand même.');
              core.setOutput('skip', 'false');
              return;
            }

            // Pour workflow_dispatch (sans force) on garde un comportement "one-shot"
            const { sRun, cRun } = await getCiStatus();

            if (sRun?.conclusion === 'failure' || cRun?.conclusion === 'failure') {
              core.setFailed('CI en échec – déploiement annulé.');
              return;
            }

            if (sRun?.conclusion !== 'success' || cRun?.conclusion !== 'success') {
              core.info('CI pas encore terminées – déploiement skippé. Relancer via workflow_dispatch une fois les CI vertes.');
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');

      # ─── 2. Choisir l'environnement ──────────────────────────────────
      - name: Déterminer l'environnement et le projet Harbor
        if: steps.ci-check.outputs.skip != 'true'
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            prod)
              ENV="prod"
              NAMESPACE="thetiptop-prod"
              HARBOR_PROJECT="thetiptop-prod"
              ;;
            preprod)
              ENV="preprod"
              NAMESPACE="thetiptop-preprod"
              HARBOR_PROJECT="thetiptop-preprod"
              ;;
            *)
              ENV="dev"
              NAMESPACE="thetiptop-dev"
              HARBOR_PROJECT="thetiptop-dev"
              ;;
          esac
          echo "env=$ENV"                   >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE"       >> $GITHUB_OUTPUT
          echo "harbor_project=$HARBOR_PROJECT" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ secrets.HARBOR_REGISTRY }}/$HARBOR_PROJECT/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "backend_image=${{ secrets.HARBOR_REGISTRY }}/$HARBOR_PROJECT/backend:${{ github.sha }}"   >> $GITHUB_OUTPUT
          echo "Environnement : $ENV | Namespace : $NAMESPACE | Harbor : $HARBOR_PROJECT"

      # ─── 3. Configurer kubectl avec le bon cluster ───────────────────
      - name: Configurer kubectl pour le cluster ${{ steps.env.outputs.env }}
        if: steps.ci-check.outputs.skip != 'true'
        id: kubectl
        env:
          KC_DEV:     ${{ secrets.KUBECONFIG_DEV }}
          KC_PREPROD: ${{ secrets.KUBECONFIG_PREPROD }}
          KC_PROD:    ${{ secrets.KUBECONFIG_PROD }}
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            prod)    KC="$KC_PROD" ;;
            preprod) KC="$KC_PREPROD" ;;
            *)       KC="$KC_DEV" ;;
          esac
          if [ -z "$KC" ]; then
            echo "⚠️ KUBECONFIG non configuré pour l'environnement $BRANCH. Déploiement skippé."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KC" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info
          echo "skip=false" >> $GITHUB_OUTPUT

      # ─── 4. Créer le namespace si absent ─────────────────────────────
      - name: Créer le namespace si absent
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          kubectl get namespace "$NS" || kubectl create namespace "$NS" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ─── 5. Créer/mettre à jour le secret Harbor (imagePullSecret) ────
      - name: Configurer le secret Harbor (imagePullSecret)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          kubectl create secret docker-registry harbor-secret \
            --docker-server="${{ secrets.HARBOR_REGISTRY }}" \
            --docker-username="${{ secrets.HARBOR_USERNAME }}" \
            --docker-password="${{ secrets.HARBOR_PASSWORD }}" \
            --namespace="$NS" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ─── 6. Appliquer les ConfigMaps ─────────────────────────────────
      - name: Appliquer la ConfigMap
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          ENV="${{ steps.env.outputs.env }}"
          kubectl apply -f "k8s/$ENV/configmap.yaml"

      # ─── 7. Créer/mettre à jour les secrets applicatifs ──────────────
      # MongoDB : MONGODB_URI_* doit pointer vers mongodb.<namespace>.svc.cluster.local (voir .github/MONGODB-K8S.md)
      - name: Créer les secrets applicatifs (MongoDB + Backend)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        env:
          MONGODB_URI_DEV:     ${{ secrets.MONGODB_URI_DEV }}
          MONGODB_URI_PREPROD: ${{ secrets.MONGODB_URI_PREPROD }}
          MONGODB_URI_PROD:    ${{ secrets.MONGODB_URI_PROD }}
          JWT_SECRET_DEV:      ${{ secrets.JWT_SECRET_DEV }}
          JWT_SECRET_PREPROD:  ${{ secrets.JWT_SECRET_PREPROD }}
          JWT_SECRET_PROD:     ${{ secrets.JWT_SECRET_PROD }}
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          BRANCH="${{ github.ref_name }}"
          NS="${{ steps.env.outputs.namespace }}"
          case "$BRANCH" in
            prod)    MONGO_URI="$MONGODB_URI_PROD";    JWT="$JWT_SECRET_PROD" ;;
            preprod) MONGO_URI="$MONGODB_URI_PREPROD"; JWT="$JWT_SECRET_PREPROD" ;;
            *)       MONGO_URI="$MONGODB_URI_DEV";     JWT="$JWT_SECRET_DEV" ;;
          esac
          # Si l'URI est stockée en base64 dans le secret, la décoder (sinon le backend reçoit la chaîne base64 et ne peut pas se connecter)
          if [ -n "$MONGO_URI" ] && ! echo "$MONGO_URI" | grep -q '^mongodb://'; then
            DECODED=$(echo "$MONGO_URI" | base64 -d 2>/dev/null || true)
            if echo "$DECODED" | grep -q '^mongodb://'; then
              echo "MONGODB_URI était en base64, utilisation de la valeur décodée."
              MONGO_URI="$DECODED"
            fi
          fi
          # Supprimer espaces en fin de ligne (fréquent après décodage base64)
          MONGO_URI=$(echo "$MONGO_URI" | sed 's/[[:space:]]*$//')
          # En preprod, forcer le host preprod (éviter thetiptop-prod au lieu de thetiptop-preprod)
          if [ "$BRANCH" = "preprod" ]; then
            MONGO_URI=$(echo "$MONGO_URI" | sed 's/mongodb\.thetiptop-prod\.svc/mongodb.thetiptop-preprod.svc/g')
          fi
          # Secret MongoDB (root credentials)
          kubectl create secret generic mongodb-secret \
            --from-literal=root-username="$MONGO_ROOT_USERNAME" \
            --from-literal=root-password="$MONGO_ROOT_PASSWORD" \
            --namespace="$NS" \
            --dry-run=client -o yaml | kubectl apply -f -
          # Secret Backend (URI MongoDB + JWT + optionnel Google OAuth)
          EXTRA_SECRETS=()
          [ -n "$GOOGLE_CLIENT_ID" ] && EXTRA_SECRETS+=(--from-literal=google-client-id="$GOOGLE_CLIENT_ID")
          [ -n "$GOOGLE_CLIENT_SECRET" ] && EXTRA_SECRETS+=(--from-literal=google-client-secret="$GOOGLE_CLIENT_SECRET")
          kubectl create secret generic backend-secret \
            --from-literal=mongodb-uri="$MONGO_URI" \
            --from-literal=jwt-secret="$JWT" \
            "${EXTRA_SECRETS[@]}" \
            --namespace="$NS" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ─── 8. Déployer MongoDB (StatefulSet) ───────────────────────────
      - name: Appliquer MongoDB StatefulSet
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          ENV="${{ steps.env.outputs.env }}"
          kubectl apply -f "k8s/$ENV/mongodb-statefulset.yaml"

      - name: Attendre que MongoDB soit prêt (rollout + readiness)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          echo "Attente du StatefulSet MongoDB (max 5 min)..."
          if kubectl rollout status statefulset/mongodb -n "$NS" --timeout=300s; then
            echo "✅ MongoDB prêt (pod Ready)."
            echo "Attente de 15s pour que l'auth MongoDB soit opérationnelle..."
            sleep 15
          else
            echo "⚠️ MongoDB pas encore Ready après 5 min (PVC/storage ou probe). Le job seed attendra via init container + retry."
            kubectl get pods -n "$NS" -l app=mongodb 2>/dev/null || true
            kubectl describe statefulset mongodb -n "$NS" 2>/dev/null | tail -30
          fi

      # ─── 8a. MinIO : namespace + secret + déploiement + Ingress (tout au push, pas de commandes manuelles)
      - name: Déployer MinIO (stockage backups + URLs dev/preprod/prod)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        env:
          RESTIC_S3_ACCESS_KEY_ID: ${{ secrets.RESTIC_S3_ACCESS_KEY_ID }}
          RESTIC_S3_SECRET_ACCESS_KEY: ${{ secrets.RESTIC_S3_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$RESTIC_S3_ACCESS_KEY_ID" ] || [ -z "$RESTIC_S3_SECRET_ACCESS_KEY" ]; then
            echo "Secrets Restic/MinIO absents : déploiement MinIO ignoré (backup désactivé)."
            exit 0
          fi
          echo "Application namespace MinIO..."
          kubectl apply -f k8s/minio/namespace.yaml
          echo "Création secret minio-credentials (identifiants = ceux utilisés par Restic)..."
          kubectl create secret generic minio-credentials --namespace=minio \
            --from-literal=root-user="$RESTIC_S3_ACCESS_KEY_ID" \
            --from-literal=root-password="$RESTIC_S3_SECRET_ACCESS_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Application MinIO (PVC + Deployment + Service)..."
          kubectl apply -f k8s/minio/deployment.yaml
          ENV="${{ steps.env.outputs.env }}"
          if [ "$ENV" = "prod" ]; then MINIO_HOST="minio.thetiptop-jeu.fr"; else MINIO_HOST="minio.${ENV}.thetiptop-jeu.fr"; fi
          echo "Application Ingress MinIO (host: $MINIO_HOST) pour certificat Let's Encrypt..."
          sed -e "s|MINIO_HOST_PLACEHOLDER|$MINIO_HOST|g" k8s/minio/ingress.yaml | kubectl apply -f -
          echo "MinIO déployé (https://$MINIO_HOST après propagation TLS)."

      # ─── 8b. Backup MongoDB : CronJobs Restic vers MinIO
      - name: Appliquer Backup MongoDB (Restic MinIO)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          SCHEDULE="0 17 * * *"
          sed -e "s|NAMESPACE_PLACEHOLDER|$NS|g" -e "s|SCHEDULE_PLACEHOLDER|$SCHEDULE|g" \
              k8s/mongodb-backup-cronjob.yaml | kubectl apply -f -
          sed -e "s|NAMESPACE_PLACEHOLDER|$NS|g" k8s/mongodb-restore-test-cronjob.yaml | kubectl apply -f -
          echo "Backup MongoDB (Restic+MinIO) + test restauration hebdo appliqués."

      - name: Créer secret Restic/MinIO (backup MongoDB)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        env:
          RESTIC_MINIO_ENDPOINT: ${{ secrets.RESTIC_MINIO_ENDPOINT }}
          RESTIC_MINIO_BUCKET: ${{ secrets.RESTIC_MINIO_BUCKET }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          RESTIC_S3_ACCESS_KEY_ID: ${{ secrets.RESTIC_S3_ACCESS_KEY_ID }}
          RESTIC_S3_SECRET_ACCESS_KEY: ${{ secrets.RESTIC_S3_SECRET_ACCESS_KEY }}
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          ENV="${{ steps.env.outputs.env }}"
          if [ -z "$RESTIC_MINIO_ENDPOINT" ] || [ -z "$RESTIC_MINIO_BUCKET" ] || [ -z "$RESTIC_PASSWORD" ] || [ -z "$RESTIC_S3_ACCESS_KEY_ID" ] || [ -z "$RESTIC_S3_SECRET_ACCESS_KEY" ]; then
            echo "Restic/MinIO non configuré (secrets GitHub manquants). Backup désactivé ; aucun impact sur le déploiement."
            exit 0
          fi
          REPO="s3:${RESTIC_MINIO_ENDPOINT}/${RESTIC_MINIO_BUCKET}/mongodb-${ENV}"
          kubectl create secret generic restic-s3-secret \
            --namespace="$NS" \
            --from-literal=restic-repository="$REPO" \
            --from-literal=restic-password="$RESTIC_PASSWORD" \
            --from-literal=access-key-id="$RESTIC_S3_ACCESS_KEY_ID" \
            --from-literal=secret-access-key="$RESTIC_S3_SECRET_ACCESS_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Secret restic-s3-secret créé (repo: $REPO)."

      # ─── 9. Déployer Backend & Frontend avec la nouvelle image ────────
      - name: Déployer Backend (nouvelle image)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          ENV="${{ steps.env.outputs.env }}"
          NS="${{ steps.env.outputs.namespace }}"
          BACKEND_IMAGE="${{ steps.env.outputs.backend_image }}"
          sed "s|HARBOR_REGISTRY/thetiptop-.*/backend:IMAGE_TAG|$BACKEND_IMAGE|g" \
            "k8s/$ENV/backend-deployment.yaml" | kubectl apply -f -
          echo "Attente du rollout backend (max 5m, non-bloquant si timeout)..."
          kubectl rollout status deployment/backend -n "$NS" --timeout=5m || {
            echo "⚠️ Rollout backend timeout - vérifiez: kubectl get pods -n $NS"
            kubectl get pods -n "$NS" -l app=backend
            kubectl describe pods -n "$NS" -l app=backend | tail -20
          }

      # ─── 9b. Seed DB : même technique qu'en dev (admin d'abord, puis tickets en arrière-plan) ───
      # Admin par env : dev = admin@thetiptop.fr, preprod = preprodadmin@thetiptop.fr, prod = prodadmin@thetiptop.fr
      - name: Créer admin/employés (npm run seed:admin) – on attend
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          ENV="${{ steps.env.outputs.env }}"
          BACKEND_IMAGE="${{ steps.env.outputs.backend_image }}"
          case "$ENV" in
            prod)    ADMIN_EMAIL="prodadmin@thetiptop.fr"    ;;
            preprod) ADMIN_EMAIL="preprodadmin@thetiptop.fr" ;;
            *)       ADMIN_EMAIL="admin@thetiptop.fr"       ;;
          esac
          ADMIN_PASS='Admin123!'
          kubectl delete job seed-admin -n "$NS" --ignore-not-found=true --wait=true
          until ! kubectl get job seed-admin -n "$NS" 2>/dev/null; do echo "Attente suppression du job seed-admin..."; sleep 2; done
          sed -e "s|BACKEND_IMAGE_PLACEHOLDER|$BACKEND_IMAGE|g" \
              -e "s|NAMESPACE_PLACEHOLDER|$NS|g" \
              -e "s|ADMIN_EMAIL_PLACEHOLDER|$ADMIN_EMAIL|g" \
              -e "s|ADMIN_PASSWORD_PLACEHOLDER|$ADMIN_PASS|g" \
              k8s/seed-admin-job.yaml | kubectl apply -f -
          echo "Attente seed-admin (max 4 min, MongoDB peut être lent au démarrage)..."
          if ! kubectl wait --for=condition=complete job/seed-admin -n "$NS" --timeout=240s; then
            echo "⚠️ Job seed-admin en échec ou timeout – logs:"
            kubectl get pods -n "$NS" -l job-name=seed-admin 2>/dev/null || true
            kubectl logs job/seed-admin -n "$NS" --tail=100 2>/dev/null || true
            POD=$(kubectl get pods -n "$NS" -l job-name=seed-admin -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            [ -n "$POD" ] && kubectl logs "$POD" -n "$NS" --tail=100
            exit 1
          fi
          echo "✅ Admin/employés créés (connexion possible)."

      - name: Lancer génération 500k tickets (npm run seed) en arrière-plan
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          BACKEND_IMAGE="${{ steps.env.outputs.backend_image }}"
          kubectl delete job seed-tickets -n "$NS" --ignore-not-found=true --wait=true
          until ! kubectl get job seed-tickets -n "$NS" 2>/dev/null; do echo "Attente suppression du job seed-tickets..."; sleep 2; done
          sed -e "s|BACKEND_IMAGE_PLACEHOLDER|$BACKEND_IMAGE|g" \
              -e "s|NAMESPACE_PLACEHOLDER|$NS|g" \
              k8s/seed-tickets-job.yaml | kubectl apply -f -
          echo "✅ Job seed-tickets lancé (500k tickets en arrière-plan, même technique qu'en dev)."

      - name: Déployer Frontend (nouvelle image)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          ENV="${{ steps.env.outputs.env }}"
          NS="${{ steps.env.outputs.namespace }}"
          FRONTEND_IMAGE="${{ steps.env.outputs.frontend_image }}"
          sed "s|HARBOR_REGISTRY/thetiptop-.*/frontend:IMAGE_TAG|$FRONTEND_IMAGE|g" \
            "k8s/$ENV/frontend-deployment.yaml" | kubectl apply -f -
          echo "Attente du rollout frontend (max 5m, non-bloquant si timeout)..."
          kubectl rollout status deployment/frontend -n "$NS" --timeout=5m || {
            echo "⚠️ Rollout frontend timeout - vérifiez: kubectl get pods -n $NS"
            kubectl get pods -n "$NS" -l app=frontend
            kubectl describe pods -n "$NS" -l app=frontend | tail -20
          }

      # ─── 10. Certificats TLS : s'assurer que le ClusterIssuer Let's Encrypt existe ───
      - name: Appliquer ClusterIssuer Let's Encrypt (cert-manager)
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          kubectl apply -f k8s/traefik/letsencrypt-issuer.yaml
          echo "ClusterIssuer letsencrypt-prod / letsencrypt-staging à jour."

      # ─── 11. (Prod, optionnel) Forcer réémission du certificat TLS ───
      - name: Réinitialiser le secret TLS en prod pour forcer Let's Encrypt
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true' && steps.env.outputs.env == 'prod' && github.event.inputs.fix_tls_prod == 'true'
        run: |
          kubectl delete secret thetiptop-prod-tls -n thetiptop-prod --ignore-not-found=true
          echo "Secret TLS prod supprimé : cert-manager réémettra le certificat à l’étape suivante."

      # ─── 12. Appliquer l'Ingress (Traefik + TLS) ─────────────────────
      - name: Appliquer l'Ingress Traefik
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          ENV="${{ steps.env.outputs.env }}"
          kubectl apply -f "k8s/$ENV/ingress.yaml"
          if [ -f "k8s/$ENV/ingress-api.yaml" ]; then kubectl apply -f "k8s/$ENV/ingress-api.yaml"; fi

      # ─── 12. Résumé ───────────────────────────────────────────────────
      - name: Résumé du déploiement
        if: steps.ci-check.outputs.skip != 'true' && steps.kubectl.outputs.skip != 'true'
        run: |
          NS="${{ steps.env.outputs.namespace }}"
          echo "========================================="
          echo " Déploiement terminé"
          echo " Environnement : ${{ steps.env.outputs.env }}"
          echo " Namespace     : $NS"
          echo " SHA           : ${{ github.sha }}"
          echo " Backend image : ${{ steps.env.outputs.backend_image }}"
          echo " Frontend image: ${{ steps.env.outputs.frontend_image }}"
          echo "========================================="
          kubectl get pods -n "$NS"
