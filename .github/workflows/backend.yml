name: Backend CI

on:
  push:
    branches: [dev, preprod, prod, main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [dev, preprod, prod, main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('backend/package-lock.json') }}
      
      - name: Install dependencies
        working-directory: backend
        run: npm install
      
      - name: Run linter
        working-directory: backend
        run: npm run lint
      
      - name: Check formatting
        working-directory: backend
        run: npm run format:check


  # Job "test-server" : vérifie que le serveur Node.js démarre et répond correctement
  # S'exécute uniquement si le job "lint" est passé avec succès
  test-server:
    runs-on: ubuntu-latest
    needs: lint  # Dépendance : attend que le lint soit OK avant de lancer ce job

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('backend/package-lock.json') }}

      - name: Install dependencies
        working-directory: backend
        run: npm install

      # Étape clé : démarre le serveur en arrière-plan avec "&"
      # Le serveur tourne en parallèle pendant que les étapes suivantes s'exécutent
      # "sleep 5" laisse le temps au serveur de démarrer avant d'envoyer des requêtes
      - name: Start server
        working-directory: backend
        run: |
          npm run dev &
          sleep 5

      # Vérifie que le serveur répond bien sur son port (3000 par défaut)
      # "curl --fail" fait échouer l'étape si le code HTTP retourné n'est pas 2xx
      # Adapte le port et la route si ton serveur utilise autre chose
      - name: Health check
        run: curl --fail http://localhost:3000

      # Bonne pratique : arrête proprement le serveur après le test
      # "pkill" cherche le processus node et l'arrête pour libérer les ressources
      - name: Stop server
        if: always()  # S'exécute même si les étapes précédentes ont échoué
        run: pkill -f "node" || true