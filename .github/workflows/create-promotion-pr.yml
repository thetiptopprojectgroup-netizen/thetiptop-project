# Création manuelle d’une PR de promotion (vdev→vpreprod ou vpreprod→vprod).
# Utile quand la création automatique (CD + script promotion) n’a pas eu lieu.
#
# Actions → Create promotion PR → Run workflow → Choisir la branche → Run workflow

name: Create promotion PR (manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branche source (promotion vers la branche suivante dans le flux)'
        required: true
        type: choice
        options:
          - vdev
          - vpreprod
        default: 'vpreprod'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Créer PR promotion
    runs-on: ubuntu-latest
    steps:
      - name: Créer la PR de promotion
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = '${{ github.event.inputs.branch }}';
            let base;
            if (branch === 'vdev') base = 'vpreprod';
            else if (branch === 'vpreprod') base = 'vprod';
            else { core.setFailed('Branche non gérée'); return; }
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            core.info('Création manuelle de la PR : ' + branch + ' → ' + base);

            const { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open', base, head: owner + ':' + branch
            });
            if (pulls.length > 0) {
              core.info('PR ' + branch + ' → ' + base + ' déjà existante : #' + pulls[0].number);
              return;
            }

            const titles = { vdev: '🚀 Promotion vdev → vpreprod', vpreprod: '🎯 Promotion vpreprod → vprod' };
            const title = titles[branch] || 'Promotion';
            const body = `PR créée manuellement (Actions). Vérifier les workflows CI Backend + Frontend sur \`${branch}\`.`;

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo, head: branch, base, title, body,
                draft: branch !== 'vdev'
              });
              core.info('PR créée : #' + pr.number + ' ' + pr.html_url);
            } catch (err) {
              if (err.status === 422) {
                const msg = (err.message || '').toLowerCase();
                if (msg.includes('already exists')) {
                  core.info('Une PR ouverte existe déjà (ou fermée récemment).');
                } else if (msg.includes('no commits between')) {
                  core.info('Aucun commit à promouvoir entre ' + branch + ' et ' + base + '.');
                  core.info('Pour vpreprod→vprod : fusionnez d’abord vdev→vpreprod pour avoir de nouveaux commits sur vpreprod.');
                  core.info('Pour vdev→vpreprod : faites des commits sur vdev puis relancez.');
                } else {
                  throw err;
                }
              } else {
                throw err;
              }
            }
