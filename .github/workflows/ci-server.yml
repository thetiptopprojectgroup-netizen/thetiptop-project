name: CI — Server

on:
  push:
    branches: [vdev, vpreprod, vprod]
  pull_request:
    branches: [vdev, vpreprod, vprod]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ci-server-${{ github.repository }}-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION_SERVER: "20"

jobs:
  backend-quality:
    name: "1 · Backend Quality"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  backend-unit:
    name: "2 · Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: [backend-quality]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  backend-integration:
    name: "3 · Backend Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-unit]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  backend-functional:
    name: "4 · Backend Functional Tests"
    runs-on: ubuntu-latest
    needs: [backend-integration]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run functional tests
        run: npm run test:functional

  backend-build:
    name: "5 · Backend Build Validation"
    runs-on: ubuntu-latest
    needs: [backend-functional]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate production start command
        run: node -e "import('./src/app.js').then(() => console.log('Backend app bootstrap OK'))"

  backend-package:
    name: "6 · Package API Image"
    runs-on: ubuntu-latest
    needs: [backend-build]
    if: github.event_name == 'push'
    env:
      HARBOR_REGISTRY_BASE: ${{ secrets.HARBOR_REGISTRY_BASE }}
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
    steps:
      - name: Harbor configuration
        id: harbor
        run: |
          BASE="${HARBOR_REGISTRY_BASE:-}"
          LEGACY="${HARBOR_REGISTRY:-}"
          if [ -n "$BASE" ] || [ -n "$LEGACY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            HOST="${BASE:-$LEGACY}"
            echo "host=$HOST" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Harbor non configuré (build image ignoré)."
          fi

      - name: Harbor project metadata
        if: steps.harbor.outputs.configured == 'true'
        id: harbor-project
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            vprod) PROJECT="vprod" ;;
            vpreprod) PROJECT="vpreprod" ;;
            vdev|*) PROJECT="vdev" ;;
          esac
          HOST="${{ steps.harbor.outputs.host }}"
          REGISTRY="${HOST}/${PROJECT}"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/api:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "login_host=${REGISTRY%%/*}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.harbor.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login Harbor
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.harbor-project.outputs.login_host }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push API image
        if: steps.harbor.outputs.configured == 'true'
        run: |
          IMAGE="${{ steps.harbor-project.outputs.image }}"
          docker build -f server/Dockerfile -t "$IMAGE" server
          docker push "$IMAGE"

  notify-pr:
    name: "7 · PR Feedback (backend)"
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-unit
      - backend-integration
      - backend-functional
      - backend-build
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Publish PR summary
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failures = Object.entries({
              backend_quality: '${{ needs.backend-quality.result }}',
              backend_unit: '${{ needs.backend-unit.result }}',
              backend_integration: '${{ needs.backend-integration.result }}',
              backend_functional: '${{ needs.backend-functional.result }}',
              backend_build: '${{ needs.backend-build.result }}',
            }).filter(([_, result]) => result !== 'success');
            const ok = failures.length === 0;
            const body = ok
              ? '✅ **CI Server** : qualité, tests (unit / intégration / fonctionnels), build backend OK.'
              : `❌ **CI Server** en échec sur : ${failures.map(([name]) => `\`${name}\``).join(', ')}.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
