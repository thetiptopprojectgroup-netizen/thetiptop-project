name: CI - Server (Backend)

on:
  push:
    branches:
      - dev
      - preprod
      - prod
  pull_request:
    branches:
      - dev
      - preprod
      - prod

jobs:
  server-ci:
    name: Server - Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend (ESLint)
        run: npm run lint

      - name: Unit tests with coverage (Jest)
        run: npm test -- --coverage

      - name: Enforce coverage >= 80%
        run: |
          npx jest --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

  server-docker-build-and-scan:
    name: Server - Build Docker image & scan (Harbor)
    runs-on: ubuntu-latest
    needs:
      - server-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build multi-stage backend image
        run: |
          docker build \
            -f server/Dockerfile \
            -t ${{ secrets.HARBOR_REGISTRY }}/thetiptop/backend:${{ github.sha }} \
            server

      - name: Push backend image to Harbor
        run: |
          docker push ${{ secrets.HARBOR_REGISTRY }}/thetiptop/backend:${{ github.sha }}

      - name: Trigger Harbor security scan (backend)
        if: always()
        run: |
          echo "Triggering Harbor scan for backend image"
          # TODO: Intégrer l'appel réel à l'API Harbor (projet, repository, tag)

  notify-server:
    name: Server - Notification CI
    runs-on: ubuntu-latest
    needs:
      - server-ci
      - server-docker-build-and-scan
    if: always()

    steps:
      - name: Déterminer le statut global
        id: set_conclusion
        run: |
          if [ "${{ needs.server-ci.result }}" = "success" ] && \
             [ "${{ needs.server-docker-build-and-scan.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Commenter sur la PR avec le résultat CI (server)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ steps.set_conclusion.outputs.status }}';
            const body = status === 'success'
              ? '✅ CI server (backend) passée avec succès (tests, Docker, scan).'
              : '❌ CI server (backend) en échec. Merci de vérifier les jobs (tests, Docker, scan).';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

