name: CI - Server (Backend)

on:
  push:
    branches:
      - dev
      - preprod
      - prod
  pull_request:
    branches:
      - dev
      - preprod
      - prod

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  server-ci:
    name: Server - Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint backend (ESLint)
        run: npm run lint

      - name: Unit tests with coverage (Jest)
        run: npm test -- --coverage --passWithNoTests

  server-docker-build-and-scan:
    name: Server - Build Docker image & scan (Harbor)
    runs-on: ubuntu-latest
    needs:
      - server-ci
    env:
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}

    steps:
      - name: Check Harbor configuration
        id: harbor
        run: |
          if [ -z "$HARBOR_REGISTRY" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Harbor secrets not configured – skipping Docker build"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.harbor.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor registry
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build multi-stage backend image
        if: steps.harbor.outputs.configured == 'true'
        run: |
          docker build \
            -f server/Dockerfile \
            -t ${{ secrets.HARBOR_REGISTRY }}/thetiptop/backend:${{ github.sha }} \
            server

      - name: Push backend image to Harbor
        if: steps.harbor.outputs.configured == 'true'
        run: |
          docker push ${{ secrets.HARBOR_REGISTRY }}/thetiptop/backend:${{ github.sha }}

      - name: Trigger Harbor security scan (backend)
        if: steps.harbor.outputs.configured == 'true'
        run: |
          echo "Triggering Trivy scan via Harbor for backend image..."
          SCAN_URL="https://${{ secrets.HARBOR_REGISTRY }}/api/v2.0/projects/thetiptop/repositories/backend/artifacts/${{ github.sha }}/scan"
          curl -s -X POST "$SCAN_URL" \
            -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
            -H "Content-Type: application/json" || echo "Scan trigger sent (may already be in progress)"
          sleep 30
          REPORT_URL="https://${{ secrets.HARBOR_REGISTRY }}/api/v2.0/projects/thetiptop/repositories/backend/artifacts/${{ github.sha }}?with_scan_overview=true"
          RESULT=$(curl -s "$REPORT_URL" \
            -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
            -H "Content-Type: application/json")
          echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          overview = data.get('scan_overview', {})
          for k, v in overview.items():
              severity = v.get('summary', {})
              print(f'Scan status: {v.get(\"scan_status\", \"unknown\")}')
              print(f'Vulnerabilities: {severity}')
          " || echo "Scan report not yet available"

  notify-server:
    name: Server - Notification CI
    runs-on: ubuntu-latest
    needs:
      - server-ci
      - server-docker-build-and-scan
    if: always()

    steps:
      - name: Déterminer le statut global
        id: set_conclusion
        run: |
          CI_RESULT="${{ needs.server-ci.result }}"
          DOCKER_RESULT="${{ needs.server-docker-build-and-scan.result }}"
          if [ "$CI_RESULT" = "success" ] && [ "$DOCKER_RESULT" = "success" -o "$DOCKER_RESULT" = "skipped" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Commenter sur la PR avec le résultat CI (server)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ steps.set_conclusion.outputs.status }}';
            const body = status === 'success'
              ? '✅ CI server (backend) passée avec succès (tests, Docker, scan).'
              : '❌ CI server (backend) en échec. Merci de vérifier les jobs (tests, Docker, scan).';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
