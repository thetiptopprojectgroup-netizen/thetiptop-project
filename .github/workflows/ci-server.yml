name: CI - Server (Backend)

on:
  push:
    branches:
      - dev
      - preprod
      - prod
  pull_request:
    branches:
      - dev
      - preprod
      - prod

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  server-ci:
    name: Server - Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint backend (ESLint)
        if: github.ref == 'refs/heads/dev' || (github.event_name == 'pull_request' && github.base_ref == 'dev')
        run: npm run lint

      - name: Unit tests with coverage (Jest)
        if: github.ref == 'refs/heads/dev' || (github.event_name == 'pull_request' && github.base_ref == 'dev')
        run: npm test -- --coverage --passWithNoTests

  server-docker-build-and-scan:
    name: Server - Build Docker image & scan (Harbor)
    runs-on: ubuntu-latest
    needs:
      - server-ci
    env:
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}

    steps:
      - name: Check Harbor configuration
        id: harbor
        run: |
          if [ -z "$HARBOR_REGISTRY" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Harbor secrets not configured – skipping Docker build"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.harbor.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor registry
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build multi-stage backend image
        if: steps.harbor.outputs.configured == 'true'
        run: |
          for attempt in 1 2 3; do
            echo "Docker build attempt $attempt/3"
            if docker build \
              -f server/Dockerfile \
              -t ${{ secrets.HARBOR_REGISTRY }}/thetiptop/backend:${{ github.sha }} \
              server; then
              echo "Build succeeded."
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Build failed (e.g. 504 from Docker Hub). Retrying in 45s..."
              sleep 45
            fi
          done
          echo "Build failed after 3 attempts."
          exit 1

      - name: Push backend image to Harbor
        if: steps.harbor.outputs.configured == 'true'
        run: |
          docker push ${{ secrets.HARBOR_REGISTRY }}/thetiptop/backend:${{ github.sha }}

      - name: Trigger Harbor security scan (backend)
        if: steps.harbor.outputs.configured == 'true'
        run: |
          echo "Triggering Trivy scan via Harbor for backend image..."
          SCAN_URL="https://${{ secrets.HARBOR_REGISTRY }}/api/v2.0/projects/thetiptop/repositories/backend/artifacts/${{ github.sha }}/scan"
          curl -s -X POST "$SCAN_URL" \
            -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
            -H "Content-Type: application/json" || echo "Scan trigger sent (may already be in progress)"
          sleep 30
          REPORT_URL="https://${{ secrets.HARBOR_REGISTRY }}/api/v2.0/projects/thetiptop/repositories/backend/artifacts/${{ github.sha }}?with_scan_overview=true"
          RESULT=$(curl -s "$REPORT_URL" \
            -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
            -H "Content-Type: application/json")
          echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          overview = data.get('scan_overview', {})
          for k, v in overview.items():
              severity = v.get('summary', {})
              print(f'Scan status: {v.get(\"scan_status\", \"unknown\")}')
              print(f'Vulnerabilities: {severity}')
          " || echo "Scan report not yet available"

  notify-server:
    name: Server - Notification CI
    runs-on: ubuntu-latest
    needs:
      - server-ci
      - server-docker-build-and-scan
    if: always()

    steps:
      - name: Déterminer le statut global
        id: set_conclusion
        run: |
          CI_RESULT="${{ needs.server-ci.result }}"
          DOCKER_RESULT="${{ needs.server-docker-build-and-scan.result }}"
          if [ "$CI_RESULT" = "success" ] && [ "$DOCKER_RESULT" = "success" -o "$DOCKER_RESULT" = "skipped" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Commenter sur la PR avec le résultat CI (server)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ steps.set_conclusion.outputs.status }}';
            const body = status === 'success'
              ? '✅ CI server (backend) passée avec succès (tests, Docker, scan).'
              : '❌ CI server (backend) en échec. Merci de vérifier les jobs (tests, Docker, scan).';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  create-promotion-pr:
    name: Créer PR promotion (auto si les 2 CI vertes)
    runs-on: ubuntu-latest
    needs: [server-ci, server-docker-build-and-scan]
    if: |
      (needs.server-ci.result == 'success') &&
      (needs.server-docker-build-and-scan.result == 'success' || needs.server-docker-build-and-scan.result == 'skipped') &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/preprod')
    steps:
      - name: Vérifier les 2 CI et créer la PR si vertes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const head_sha = context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: { workflows } } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const serverCi = workflows.find(w => w.name === 'CI - Server (Backend)');
            const clientCi = workflows.find(w => w.name === 'CI - Client (Frontend)');
            if (!serverCi || !clientCi) {
              core.info('Workflows CI introuvables.');
              return;
            }

            const getRuns = async (workflowId) => {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, workflow_id: workflowId, branch, per_page: 20
              });
              return data.workflow_runs || [];
            };
            const serverRuns = await getRuns(serverCi.id);
            const clientRuns = await getRuns(clientCi.id);
            const serverRun = serverRuns.find(r => r.head_sha === head_sha);
            const clientRun = clientRuns.find(r => r.head_sha === head_sha);

            if (serverRun?.conclusion !== 'success' || clientRun?.conclusion !== 'success') {
              core.info('Les 2 CI ne sont pas encore vertes pour ce commit. La PR sera créée quand l\'autre CI aura terminé.');
              return;
            }

            const base = branch === 'dev' ? 'preprod' : 'prod';
            const head = branch;
            const { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open', base, head: owner + ':' + head
            });
            if (pulls.length > 0) {
              core.info('PR ' + head + ' → ' + base + ' déjà existante: #' + pulls[0].number);
              return;
            }
            const title = branch === 'dev' ? '🚀 Promotion dev → preprod' : '🎯 Promotion preprod → prod';
            const body = branch === 'dev'
              ? 'Promotion automatique : CI Server et CI Client ont réussi sur `dev`.'
              : 'Mise en production : CI Server et CI Client ont réussi sur `preprod`.';
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo, head, base, title, body,
                draft: branch !== 'dev'
              });
              core.info('PR ' + head + ' → ' + base + ' créée: #' + pr.number);
            } catch (err) {
              if (err.status === 422 && err.message && err.message.includes('already exists')) {
                core.info('PR déjà existante (ignoré).');
              } else {
                throw err;
              }
            }
