# CI — Frontend : démarre uniquement après une exécution **terminée** de « CI — Backend »
# (`workflow_run`). Si le backend n’est pas vert, le workflow échoue au job « Backend requis ».
# Le run apparaît comme un **workflow séparé** dans l’onglet Actions.
#
# Contrainte GitHub : ce fichier doit exister sur la **branche par défaut** du dépôt pour que
# `workflow_run` soit pris en compte.
# -----------------------------------------------------------------------------
name: CI — Frontend

on:
  workflow_run:
    workflows: ["CI — Backend"]
    types: [completed]
    branches: [vdev, vpreprod, vprod]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-frontend-${{ github.event.workflow_run.head_sha }}

jobs:
  backend-required:
    name: "0 · Backend requis (échec si CI — Backend non verte)"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'success'
    steps:
      - name: Arrêt — backend non vert
        run: |
          echo "::error::CI — Backend terminée avec « ${{ github.event.workflow_run.conclusion }} » — aucun job frontend n'est exécuté."
          exit 1

  meta:
    name: "0 · Contexte (SHA / PR)"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      pr_number: ${{ steps.ctx.outputs.pr_number }}
    steps:
      - id: ctx
        uses: actions/github-script@v8
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            const n = prs.length ? String(prs[0].number) : '';
            core.setOutput('pr_number', n);

  frontend:
    name: "CI Frontend (jobs)"
    needs: [meta]
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/ci-frontend-reusable.yml
    secrets: inherit
    with:
      commit_sha: ${{ github.event.workflow_run.head_sha }}
      source_event: ${{ github.event.workflow_run.event }}
      pr_number: ${{ needs.meta.outputs.pr_number }}
      head_branch: ${{ github.event.workflow_run.head_branch }}
