name: CD - Client (Préparation déploiement frontend)

on:
  push:
    branches:
      - dev

jobs:
  prepare-client-artifacts:
    name: Client - Préparer artefacts de déploiement
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      # TODO (phase hébergement) :
