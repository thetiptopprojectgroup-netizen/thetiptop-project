name: CD - Client (Promotion automatique)

on:
  push:
    branches: [dev, preprod]
  workflow_run:
    workflows: ["CI - Client (Frontend)"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  # CrĂ©er PR dev â†’ preprod quand CI passe sur dev
  create-preprod-pr:
    name: CrĂ©er PR dev â†’ preprod (client)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CrĂ©er ou mettre Ă  jour PR dev â†’ preprod
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'preprod',
              head: `${context.repo.owner}:dev`
            });

            if (pulls.length > 0) {
              core.info(`PR dev â†’ preprod dĂ©jĂ  existante: #${pulls[0].number}`);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: 'dev',
                base: 'preprod',
                title: 'đźš€ Promotion dev â†’ preprod',
                body: [
                  '## Promotion automatique',
                  '',
                  'Cette PR a Ă©tĂ© crĂ©Ă©e automatiquement car tous les tests CI ont passĂ© sur la branche `dev`.',
                  '',
                  '### Checklist avant merge',
                  '- [ ] Revue de code effectuĂ©e',
                  '- [ ] Tests manuels si nĂ©cessaire',
                  '',
                  '---',
                  '_CrĂ©Ă©e par le workflow CD Client_'
                ].join('\n'),
                draft: false
              });
              core.info(`PR dev â†’ preprod crĂ©Ă©e: #${pr.number}`);
            }

  # CrĂ©er PR preprod â†’ prod quand CI passe sur preprod
  create-prod-pr:
    name: CrĂ©er PR preprod â†’ prod (client)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/preprod') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'preprod')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CrĂ©er ou mettre Ă  jour PR preprod â†’ prod
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'prod',
              head: context.repo.owner + ':preprod'
            });

            if (pulls.length > 0) {
              core.info(`PR preprod â†’ prod dĂ©jĂ  existante: #${pulls[0].number}`);
            } else {
              try {
                const { data: pr } = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head: 'preprod',
                  base: 'prod',
                  title: 'đźŽŻ Promotion preprod â†’ prod',
                  body: [
                    '## Mise en production',
                    '',
                    'Cette PR a Ă©tĂ© crĂ©Ă©e automatiquement car tous les tests CI ont passĂ© sur la branche `preprod`.',
                    '',
                    '### Checklist avant mise en production',
                    '- [ ] Tests de prĂ©-production validĂ©s',
                    '- [ ] Revue de code effectuĂ©e',
                    '- [ ] Plan de rollback prĂ©parĂ©',
                    '',
                    'âš ď¸Ź **Attention**: Cette PR dĂ©ploiera les changements en production.',
                    '',
                    '---',
                    '_CrĂ©Ă©e par le workflow CD Client_'
                  ].join('\n'),
                  draft: true
                });
                core.info(`PR preprod â†’ prod crĂ©Ă©e (draft): #${pr.number}`);
              } catch (err) {
                if (err.status === 422 && err.message && err.message.includes('already exists')) {
                  pulls = (await github.rest.pulls.list({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: 'open',
                    base: 'prod',
                    head: context.repo.owner + ':preprod'
                  })).data;
                  if (pulls.length > 0) {
                    core.info(`PR preprod â†’ prod dĂ©jĂ  existante: #${pulls[0].number} (ignorĂ© doublon)`);
                  } else {
                    core.info('PR preprod â†’ prod dĂ©jĂ  existante (ignorĂ© doublon)');
                  }
                } else {
                  throw err;
                }
              }
            }
