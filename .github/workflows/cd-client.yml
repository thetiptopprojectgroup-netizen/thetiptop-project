# CrĂ©e la PR devâ†’preprod ou preprodâ†’prod quand CI Server ET CI Client sont verts.
# IMPORTANT : Quand le CD est dĂ©clenchĂ© par workflow_run (fin d'une CI), GitHub exĂ©cute ce fichier
# depuis la BRANCHE PAR DĂ‰FAUT du dĂ©pĂ´t (souvent main). Il faut que ce fichier soit Ă  jour sur la
# branche par dĂ©faut, sinon le CD utilisera une ancienne version et peut Ă©chouer ("CI Server pas encore OK").
name: CD - Client (Frontend)

# DĂ©clenchĂ© par push, Ă  la fin de chaque CI (workflow_run), ou manuellement.
# workflow_run : quand une des 2 CI se termine, on revĂ©rifie les 2 ; si les 2 sont vertes, on crĂ©e la PR.
on:
  push:
    branches:
      - dev
      - preprod
      - prod
  workflow_run:
    workflows: ["CI - Server (Backend)", "CI - Client (Frontend)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      promote:
        description: 'Promouvoir (crĂ©er la PR devâ†’preprod ou preprodâ†’prod si les 2 CI sont vertes)'
        required: false
        default: 'oui'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  cd-client:
    name: CD Client (Frontend)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'push' && contains(fromJSON('["dev", "preprod", "prod"]'), github.ref_name))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: VĂ©rifier les 2 CI puis crĂ©er la PR si besoin
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Branche et SHA : depuis le push/dispatch ou depuis le workflow_run qui nous a dĂ©clenchĂ©s
            const isPushOrDispatch = context.eventName === 'push' || context.eventName === 'workflow_dispatch';
            const branch = isPushOrDispatch ? context.ref.replace('refs/heads/', '') : context.payload.workflow_run.head_branch;
            const head_sha = isPushOrDispatch ? context.sha : context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (branch === 'prod') {
              core.info('Branche prod : rien Ă  promouvoir.');
              return;
            }

            const { data: { workflows } } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const serverCi = workflows.find(w => w.name === 'CI - Server (Backend)');
            const clientCi = workflows.find(w => w.name === 'CI - Client (Frontend)');
            if (!serverCi || !clientCi) {
              core.setFailed('Workflows CI introuvables.');
              return;
            }

            const getRuns = async (workflowId) => {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, workflow_id: workflowId, branch, per_page: 20
              });
              return data.workflow_runs || [];
            };
            const [serverRuns, clientRuns] = await Promise.all([getRuns(serverCi.id), getRuns(clientCi.id)]);
            const serverRun = serverRuns.find(r => r.head_sha === head_sha);
            const clientRun = clientRuns.find(r => r.head_sha === head_sha);

            // 1) Au moins une CI en Ă©chec â†’ on fait Ă©chouer le job
            if (serverRun?.conclusion === 'failure' || clientRun?.conclusion === 'failure') {
              core.setFailed('CI Server ou CI Client en Ă©chec pour ce commit.');
              return;
            }
            // 2) Les deux ne sont pas encore en succĂ¨s (en cours ou pas trouvĂ©es) â†’ succĂ¨s sans PR (lâ€™autre CI relancera le CD)
            if (serverRun?.conclusion !== 'success' || clientRun?.conclusion !== 'success') {
              core.info('Les 2 CI ne sont pas encore toutes les deux en succĂ¨s. Aucune PR crĂ©Ă©e ; le CD sera relancĂ© Ă  la fin de lâ€™autre CI.');
              return;
            }

            // 3) Les deux CI sont vertes â†’ crĂ©er la PR devâ†’preprod ou preprodâ†’prod
            const base = branch === 'dev' ? 'preprod' : 'prod';
            const head = branch;
            let { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open', base, head: owner + ':' + head
            });
            if (pulls.length > 0) {
              core.info(`PR ${head} â†’ ${base} dĂ©jĂ  existante: #${pulls[0].number}`);
              return;
            }
            const title = branch === 'dev' ? 'đźš€ Promotion dev â†’ preprod' : 'đźŽŻ Promotion preprod â†’ prod';
            const body = branch === 'dev'
              ? 'Promotion automatique : CI Server et CI Client ont rĂ©ussi sur `dev`.'
              : 'Mise en production : CI Server et CI Client ont rĂ©ussi sur `preprod`.';
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo, head, base, title, body,
                draft: branch !== 'dev'
              });
              core.info(`PR ${head} â†’ ${base} crĂ©Ă©e: #${pr.number}`);
            } catch (err) {
              if (err.status === 422 && err.message && err.message.includes('already exists')) {
                core.info('PR dĂ©jĂ  existante (ignorĂ©).');
              } else {
                throw err;
              }
            }
