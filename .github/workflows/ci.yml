name: CI — Monorepo (server + client)

on:
  push:
    branches: [vdev, vpreprod, vprod]
  pull_request:
    branches: [vdev, vpreprod, vprod]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION_SERVER: "20"
  NODE_VERSION_CLIENT: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — Quality gates (lint + static build sanity)
  # ---------------------------------------------------------------------------
  backend-quality:
    name: "1 · Backend Quality"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  frontend-quality:
    name: "1 · Frontend Quality"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  # ---------------------------------------------------------------------------
  # Stage 2 — Unit tests
  # ---------------------------------------------------------------------------
  backend-unit:
    name: "2 · Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: [backend-quality]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  frontend-unit:
    name: "2 · Frontend Unit Tests"
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # Stage 3 — Integration tests
  # ---------------------------------------------------------------------------
  backend-integration:
    name: "3 · Backend Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-unit]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  frontend-integration:
    name: "3 · Frontend Integration Tests"
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  # ---------------------------------------------------------------------------
  # Stage 4 — Functional tests
  # ---------------------------------------------------------------------------
  backend-functional:
    name: "4 · Backend Functional Tests"
    runs-on: ubuntu-latest
    needs: [backend-integration]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run functional tests
        run: npm run test:functional

  frontend-functional:
    name: "4 · Frontend Functional Tests"
    runs-on: ubuntu-latest
    needs: [frontend-integration]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run functional tests
        run: npm run test:functional

  # ---------------------------------------------------------------------------
  # Stage 5 — Build validation
  # ---------------------------------------------------------------------------
  frontend-build:
    name: "5 · Frontend Build Validation"
    runs-on: ubuntu-latest
    needs: [frontend-functional]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

  backend-build:
    name: "5 · Backend Build Validation"
    runs-on: ubuntu-latest
    needs: [backend-functional]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate production start command
        run: node -e "import('./src/app.js').then(() => console.log('Backend app bootstrap OK'))"

  # ---------------------------------------------------------------------------
  # Stage 6 — Package (Docker images for environment branches only)
  # ---------------------------------------------------------------------------
  backend-package:
    name: "6 · Package API Image"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push'
    env:
      HARBOR_REGISTRY_BASE: ${{ secrets.HARBOR_REGISTRY_BASE }}
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
    steps:
      - name: Harbor configuration
        id: harbor
        run: |
          BASE="${HARBOR_REGISTRY_BASE:-}"
          LEGACY="${HARBOR_REGISTRY:-}"
          if [ -n "$BASE" ] || [ -n "$LEGACY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            HOST="${BASE:-$LEGACY}"
            echo "host=$HOST" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Harbor non configuré (build image ignoré)."
          fi

      - name: Harbor project metadata
        if: steps.harbor.outputs.configured == 'true'
        id: harbor-project
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            vprod) PROJECT="vprod" ;;
            vpreprod) PROJECT="vpreprod" ;;
            vdev|*) PROJECT="vdev" ;;
          esac
          HOST="${{ steps.harbor.outputs.host }}"
          REGISTRY="${HOST}/${PROJECT}"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/api:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "login_host=${REGISTRY%%/*}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.harbor.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login Harbor
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.harbor-project.outputs.login_host }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push API image
        if: steps.harbor.outputs.configured == 'true'
        run: |
          IMAGE="${{ steps.harbor-project.outputs.image }}"
          docker build -f server/Dockerfile -t "$IMAGE" server
          docker push "$IMAGE"

  frontend-package:
    name: "6 · Package Client Image"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push'
    env:
      HARBOR_REGISTRY_BASE: ${{ secrets.HARBOR_REGISTRY_BASE }}
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
    steps:
      - name: Harbor configuration
        id: harbor
        run: |
          BASE="${HARBOR_REGISTRY_BASE:-}"
          LEGACY="${HARBOR_REGISTRY:-}"
          if [ -n "$BASE" ] || [ -n "$LEGACY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "host=${BASE:-$LEGACY}" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Harbor non configuré (build image ignoré)."
          fi

      - name: Harbor project metadata
        if: steps.harbor.outputs.configured == 'true'
        id: harbor-project
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            vprod)
              PROJECT="vprod"
              VITE_API_URL="https://dsp5-archi-o22a-15m-g3.fr/api"
              SITE_URL="https://dsp5-archi-o22a-15m-g3.fr"
              ;;
            vpreprod)
              PROJECT="vpreprod"
              VITE_API_URL="https://vpreprod.dsp5-archi-o22a-15m-g3.fr/api"
              SITE_URL="https://vpreprod.dsp5-archi-o22a-15m-g3.fr"
              ;;
            vdev|*)
              PROJECT="vdev"
              VITE_API_URL="https://vdev.dsp5-archi-o22a-15m-g3.fr/api"
              SITE_URL="https://vdev.dsp5-archi-o22a-15m-g3.fr"
              ;;
          esac
          HOST="${{ steps.harbor.outputs.host }}"
          REGISTRY="${HOST}/${PROJECT}"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/client:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "login_host=${REGISTRY%%/*}" >> "$GITHUB_OUTPUT"
          echo "vite_api_url=$VITE_API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.harbor.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login Harbor
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.harbor-project.outputs.login_host }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push client image
        if: steps.harbor.outputs.configured == 'true'
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
        run: |
          IMAGE="${{ steps.harbor-project.outputs.image }}"
          LASTMOD_DATE="$(git log -1 --format=%cs)"
          docker build -f client/Dockerfile --target production \
            --build-arg VITE_API_URL="${{ steps.harbor-project.outputs.vite_api_url }}" \
            --build-arg SITE_URL="${{ steps.harbor-project.outputs.site_url }}" \
            --build-arg LASTMOD_DATE="${LASTMOD_DATE}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID}" \
            --build-arg VITE_GA_MEASUREMENT_ID="${VITE_GA_MEASUREMENT_ID}" \
            -t "$IMAGE" client
          docker push "$IMAGE"

  # ---------------------------------------------------------------------------
  # Stage 7 — PR feedback
  # ---------------------------------------------------------------------------
  notify-pr:
    name: "7 · PR Feedback"
    runs-on: ubuntu-latest
    needs:
      [
        backend-quality,
        frontend-quality,
        backend-unit,
        frontend-unit,
        backend-integration,
        frontend-integration,
        backend-functional,
        frontend-functional,
        backend-build,
        frontend-build
      ]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Publish PR summary
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failures = Object.entries({
              backend_quality: '${{ needs.backend-quality.result }}',
              frontend_quality: '${{ needs.frontend-quality.result }}',
              backend_unit: '${{ needs.backend-unit.result }}',
              frontend_unit: '${{ needs.frontend-unit.result }}',
              backend_integration: '${{ needs.backend-integration.result }}',
              frontend_integration: '${{ needs.frontend-integration.result }}',
              backend_functional: '${{ needs.backend-functional.result }}',
              frontend_functional: '${{ needs.frontend-functional.result }}',
              backend_build: '${{ needs.backend-build.result }}',
              frontend_build: '${{ needs.frontend-build.result }}',
            }).filter(([_, result]) => result !== 'success');
            const ok = failures.length === 0;
            const body = ok
              ? '✅ CI validée avec stages DevOps : quality, unit, integration, functional, build.'
              : `❌ CI en échec sur: ${failures.map(([name]) => `\`${name}\``).join(', ')}.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # Promotion : gate CD = run CI **push** uniquement. PRs [Promotion] : job « 4 · PR promotion » dans CD / vdev|vpreprod.
