# Déploiement **manuel** seul. Push normal : `ci-pipeline.yml`.
# -----------------------------------------------------------------------------
name: CD / vpreprod

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-vpreprod-manual
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-vpreprod-reusable.yml
    secrets: inherit
    with:
      commit_sha: ${{ github.sha }}
