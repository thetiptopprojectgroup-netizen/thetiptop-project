# -----------------------------------------------------------------------------
# CD — Branche vpreprod
# Secret multiligne : VPREPROD_ENV_FILE (contenu de infra/deploy/env/vpreprod.env)
# -----------------------------------------------------------------------------
name: CD / vpreprod

on:
  push:
    branches: [vpreprod]

permissions:
  contents: read

concurrency:
  group: deploy-vpreprod
  cancel-in-progress: true

env:
  HARBOR_PROJECT: vpreprod
  VITE_API_URL: https://vpreprod.dsp5-archi-o22a-15m-g3.fr/api

jobs:
  harbor-project:
    name: "1 · Harbor — projet vpreprod"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Créer le projet s'il n'existe pas
        env:
          HARBOR_URL: https://${{ secrets.HARBOR_REGISTRY_BASE }}
          HARBOR_ADMIN_USER: ${{ secrets.HARBOR_ADMIN_USER }}
          HARBOR_ADMIN_PASSWORD: ${{ secrets.HARBOR_ADMIN_PASSWORD }}
          HARBOR_PROJECT_NAME: ${{ env.HARBOR_PROJECT }}
        run: bash infra/scripts/ensure-harbor-project.sh

  build-and-push:
    name: "2 · Registry — build & push images"
    needs: [harbor-project]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login (robot)
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          LOGIN_SERVER="${REGISTRY%%/*}"
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "${LOGIN_SERVER}" \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build & push API
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          docker build -t "${REGISTRY}/api:${{ github.sha }}" -f server/Dockerfile server
          docker push "${REGISTRY}/api:${{ github.sha }}"

      - name: Build & push client
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          docker build \
            --build-arg VITE_API_URL="${{ env.VITE_API_URL }}" \
            -t "${REGISTRY}/client:${{ github.sha }}" \
            -f client/Dockerfile client
          docker push "${REGISTRY}/client:${{ github.sha }}"

  deploy-vps:
    name: "3 · VPS — rsync & docker compose"
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Écrire vpreprod.env sur le VPS + sync + compose
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPREPROD_ENV_FILE: ${{ secrets.VPREPROD_ENV_FILE || secrets.VPREPROD_ENV }}
          VPREPROD_ENV_FILE_B64: ${{ secrets.VPREPROD_ENV_FILE_B64 }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_REGISTRY_HOST_RAW: ${{ secrets.HARBOR_REGISTRY_BASE }}
        run: |
          set -euo pipefail
          if [ -n "${VPREPROD_ENV_FILE_B64:-}" ]; then
            CONTENT="$(printf '%s' "$VPREPROD_ENV_FILE_B64" | base64 -d)"
          elif [ -n "${VPREPROD_ENV_FILE:-}" ]; then
            CONTENT="$VPREPROD_ENV_FILE"
          else
            echo "::error::Secret VPREPROD_ENV_FILE (ou VPREPROD_ENV / VPREPROD_ENV_FILE_B64) manquant. Collez le contenu de vpreprod.env dans un secret de dépôt (voir deploy-vdev.yml pour le même principe)."
            exit 1
          fi
          CONTENT="$(printf '%s' "$CONTENT" | tr -d '\r')"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          REMOTE="${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}"
          SSH_BASE=(ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes)
          "${SSH_BASE[@]}" "$REMOTE" "mkdir -p /opt/thetiptop/app/infra/deploy/env"
          printf '%s\n' "$CONTENT" | "${SSH_BASE[@]}" "$REMOTE" "cat > /opt/thetiptop/app/infra/deploy/env/vpreprod.env"
          "${SSH_BASE[@]}" "$REMOTE" "chmod 600 /opt/thetiptop/app/infra/deploy/env/vpreprod.env"
          RSYNC_SSH='ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes'
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'client/node_modules' \
            --exclude 'server/node_modules' \
            --exclude 'infra/deploy/env/*.env' \
            -e "$RSYNC_SSH" \
            ./ "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}:/opt/thetiptop/app/"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST_RAW#https://}"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST#http://}"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST%%/*}"
          printf '%s\n' "$HARBOR_PASSWORD" | "${SSH_BASE[@]}" "$REMOTE" \
            "docker login \"$HARBOR_REGISTRY_HOST\" -u \"$HARBOR_USERNAME\" --password-stdin"
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail
             cd /opt/thetiptop/app
             export REGISTRY='${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}'
             export IMAGE_TAG='${{ github.sha }}'
             docker compose -f infra/deploy/docker-compose.stack.yml \
               --env-file infra/deploy/env/vpreprod.env \
               up -d --remove-orphans"
