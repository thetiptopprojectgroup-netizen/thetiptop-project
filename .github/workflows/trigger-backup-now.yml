# Lancer un backup MongoDB maintenant (test manuel).
name: Trigger backup now
on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environnement'
        required: true
        type: choice
        options: [dev, preprod, prod]
        default: dev
permissions:
  contents: read
jobs:
  backup:
    name: Backup MongoDB (${{ github.event.inputs.env }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurer kubectl
        env:
          KC_DEV:     ${{ secrets.KUBECONFIG_DEV }}
          KC_PREPROD: ${{ secrets.KUBECONFIG_PREPROD }}
          KC_PROD:    ${{ secrets.KUBECONFIG_PROD }}
        run: |
          ENV="${{ github.event.inputs.env }}"
          case "$ENV" in prod)    KC="$KC_PROD";    NS="thetiptop-prod"    ;; preprod) KC="$KC_PREPROD"; NS="thetiptop-preprod" ;; *) KC="$KC_DEV"; NS="thetiptop-dev" ;; esac
          [ -z "$KC" ] && { echo "KUBECONFIG manquant."; exit 1; }
          echo "$KC" | base64 -d > kubeconfig
          echo "KUBECONFIG_PATH=$PWD/kubeconfig" >> $GITHUB_ENV
          echo "NAMESPACE=$NS" >> $GITHUB_ENV
      - name: Lancer backup
        env:
          KUBECONFIG: ${{ env.KUBECONFIG_PATH }}
        run: |
          NS="${{ env.NAMESPACE }}"
          JOB="backup-manual-$(date +%s)"
          kubectl create job "$JOB" -n "$NS" --from=cronjob/mongodb-backup
          kubectl wait --for=condition=complete job/"$JOB" -n "$NS" --timeout=1800s || true
      - name: Logs
        if: always()
        env:
          KUBECONFIG: ${{ env.KUBECONFIG_PATH }}
        run: |
          JOB="$(kubectl get jobs -n ${{ env.NAMESPACE }} -l job-name --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null)"
          [ -n "$JOB" ] && kubectl logs job/"$JOB" -n ${{ env.NAMESPACE }} --all-containers=true --tail=100 2>/dev/null || true
