name: CI — Client

on:
  push:
    branches: [vdev, vpreprod, vprod]
  pull_request:
    branches: [vdev, vpreprod, vprod]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ci-client-${{ github.repository }}-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION_CLIENT: "22"

jobs:
  # Le pipeline client ne démarre (lint/tests/build) qu’après succès de CI — Server sur le même commit.
  await-backend-ci:
    name: "0 · Attente CI — Server (succès)"
    runs-on: ubuntu-latest
    steps:
      - name: Attendre la fin du workflow backend
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.pull_request?.head?.sha || context.sha;
            const evt = context.eventName;
            const maxAttempts = 90;
            const delayMs = 10000;
            core.info(
              `Attente de « CI — Server » (${evt}) verte pour ${headSha.slice(0, 7)}…`
            );
            for (let i = 0; i < maxAttempts; i++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: headSha,
                per_page: 30,
              });
              const subset = (data.workflow_runs || []).filter(
                (w) => w.name === 'CI — Server' && w.event === evt
              );
              if (subset.length === 0) {
                core.info(
                  `Aucun run « CI — Server » encore (tentative ${i + 1}/${maxAttempts})…`
                );
                await new Promise((r) => setTimeout(r, delayMs));
                continue;
              }
              const latest = subset.sort(
                (a, b) => new Date(b.created_at) - new Date(a.created_at)
              )[0];
              if (latest.status !== 'completed') {
                core.info(
                  `CI — Server : ${latest.status} (#${latest.id}) — tentative ${i + 1}/${maxAttempts}`
                );
                await new Promise((r) => setTimeout(r, delayMs));
                continue;
              }
              if (latest.conclusion === 'success') {
                core.info(
                  `CI — Server OK (#${latest.id}) — démarrage du pipeline frontend.`
                );
                return;
              }
              core.setFailed(
                `CI — Server terminée en « ${latest.conclusion} » — pipeline frontend annulé.`
              );
              return;
            }
            core.setFailed(
              'Timeout : CI — Server pas verte à temps — pipeline frontend annulé.'
            );

  frontend-quality:
    name: "1 · Frontend Quality"
    runs-on: ubuntu-latest
    needs: [await-backend-ci]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache client/node_modules
        id: cache-client-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Tests qualité (7)
        run: npm run test:quality

  frontend-unit:
    name: "2 · Frontend Unit Tests"
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache client/node_modules
        id: cache-client-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run unit tests (10 cœur + composants)
        run: npm run test:unit && npm run test:unit:components

  frontend-integration:
    name: "3 · Frontend Integration Tests"
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache client/node_modules
        id: cache-client-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run integration tests (15)
        run: npm run test:integration

  frontend-functional:
    name: "4 · Frontend Functional Tests (Jest)"
    runs-on: ubuntu-latest
    needs: [frontend-integration]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache client/node_modules
        id: cache-client-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run functional tests (15)
        run: npm run test:functional

  frontend-e2e:
    name: "5 · E2E (Playwright)"
    runs-on: ubuntu-latest
    needs: [frontend-functional]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache client/node_modules
        id: cache-client-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (7)
        run: npm run test:e2e
        env:
          CI: true

  frontend-build:
    name: "6 · Frontend Build Validation"
    runs-on: ubuntu-latest
    needs: [frontend-e2e]
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache client/node_modules
        id: cache-client-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build frontend
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

  frontend-package:
    name: "7 · Package Client Image"
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.event_name == 'push'
    env:
      HARBOR_REGISTRY_BASE: ${{ secrets.HARBOR_REGISTRY_BASE }}
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
    steps:
      - name: Harbor configuration
        id: harbor
        run: |
          BASE="${HARBOR_REGISTRY_BASE:-}"
          LEGACY="${HARBOR_REGISTRY:-}"
          if [ -n "$BASE" ] || [ -n "$LEGACY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "host=${BASE:-$LEGACY}" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Harbor non configuré (build image ignoré)."
          fi

      - name: Harbor project metadata
        if: steps.harbor.outputs.configured == 'true'
        id: harbor-project
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            vprod)
              PROJECT="vprod"
              VITE_API_URL="https://dsp5-archi-o22a-15m-g3.fr/api"
              SITE_URL="https://dsp5-archi-o22a-15m-g3.fr"
              ;;
            vpreprod)
              PROJECT="vpreprod"
              VITE_API_URL="https://vpreprod.dsp5-archi-o22a-15m-g3.fr/api"
              SITE_URL="https://vpreprod.dsp5-archi-o22a-15m-g3.fr"
              ;;
            vdev|*)
              PROJECT="vdev"
              VITE_API_URL="https://vdev.dsp5-archi-o22a-15m-g3.fr/api"
              SITE_URL="https://vdev.dsp5-archi-o22a-15m-g3.fr"
              ;;
          esac
          HOST="${{ steps.harbor.outputs.host }}"
          REGISTRY="${HOST}/${PROJECT}"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/client:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "login_host=${REGISTRY%%/*}" >> "$GITHUB_OUTPUT"
          echo "vite_api_url=$VITE_API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.harbor.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login Harbor
        if: steps.harbor.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.harbor-project.outputs.login_host }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push client image
        if: steps.harbor.outputs.configured == 'true'
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
        run: |
          IMAGE="${{ steps.harbor-project.outputs.image }}"
          LASTMOD_DATE="$(git log -1 --format=%cs)"
          docker build -f client/Dockerfile --target production \
            --build-arg VITE_API_URL="${{ steps.harbor-project.outputs.vite_api_url }}" \
            --build-arg SITE_URL="${{ steps.harbor-project.outputs.site_url }}" \
            --build-arg LASTMOD_DATE="${LASTMOD_DATE}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID}" \
            --build-arg VITE_GA_MEASUREMENT_ID="${VITE_GA_MEASUREMENT_ID}" \
            -t "$IMAGE" client
          docker push "$IMAGE"

  notify-pr:
    name: "8 · PR Feedback (frontend)"
    runs-on: ubuntu-latest
    needs:
      - await-backend-ci
      - frontend-quality
      - frontend-unit
      - frontend-integration
      - frontend-functional
      - frontend-e2e
      - frontend-build
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Publish PR summary
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failures = Object.entries({
              await_backend: '${{ needs.await-backend-ci.result }}',
              frontend_quality: '${{ needs.frontend-quality.result }}',
              frontend_unit: '${{ needs.frontend-unit.result }}',
              frontend_integration: '${{ needs.frontend-integration.result }}',
              frontend_functional: '${{ needs.frontend-functional.result }}',
              frontend_e2e: '${{ needs.frontend-e2e.result }}',
              frontend_build: '${{ needs.frontend-build.result }}',
            }).filter(([_, result]) => result !== 'success' && result !== 'skipped');
            const ok = failures.length === 0;
            const body = ok
              ? '✅ **CI Client** : backend déjà vert, puis qualité / tests / build frontend OK.'
              : `❌ **CI Client** en échec ou bloquée sur : ${failures.map(([name]) => `\`${name}\``).join(', ')}.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
