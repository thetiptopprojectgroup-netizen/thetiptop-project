# PR automatique vdev → vpreprod après CD vdev vert.
#
# IMPORTANT — GitHub : les workflows déclenchés par « workflow_run » ne s’exécutent
# qu’à partir de la BRANCHE PAR DÉFAUT du dépôt (souvent main). Si ce fichier n’y est
# pas mergé, la PR ne sera jamais créée après un push sur vdev.
#
# Test manuel : Actions → « PR vdev → vpreprod » → Run workflow (sans attendre le CD).
# -----------------------------------------------------------------------------
name: PR vdev → vpreprod (après CD vert)

on:
  workflow_run:
    workflows:
      - CD / vdev
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Ouvrir ou ignorer PR vdev → vpreprod
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'vdev') }}
    steps:
      - name: Créer une PR vers vpreprod (si absente)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run = context.payload.workflow_run;
            const base = 'vpreprod';
            const headBranch = 'vdev';

            const triggerNote = run
              ? `- Workflow : [${run.name}](${run.html_url})\n- Commit : \`${run.head_sha?.slice(0, 7) ?? 'n/a'}\``
              : '- Déclenché **manuellement** (Run workflow)';

            const { data: open } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              per_page: 100,
            });
            const exists = open.some(
              (p) => p.head.ref === headBranch && p.base.ref === base
            );
            if (exists) {
              const pr = open.find((p) => p.head.ref === headBranch);
              core.info(`Une PR ${headBranch} → ${base} est déjà ouverte${pr ? ` (#${pr.number})` : ''}.`);
              return;
            }

            const body = [
              '## Promotion vers vpreprod',
              '',
              'PR en **brouillon** : le merge reste **manuel** — **toi ou ton binôme** pouvez la passer en « Ready for review » puis merger quand c’est bon.',
              '',
              '1. Vérifier sur **vdev** si besoin.',
              '2. **Ready for review** puis **Merge** → lance le CD **vpreprod**.',
              '',
              '---',
              '',
              '**Déclencheur** : déploiement vdev réussi (tous les jobs verts), ou test manuel.',
              '',
              triggerNote,
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              head: headBranch,
              base,
              title: '[Promotion] vdev → vpreprod',
              body,
              draft: true,
            });
            core.info(`PR créée : #${pr.data.number}`);
