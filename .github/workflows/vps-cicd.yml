name: VPS CI/CD

on:
  push:
    branches:
      - vdev
      - vpreprod
      - vprod

env:
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  IMAGE_PREFIX: thetiptop

jobs:
  test:
    name: Test (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Lint client
        run: npm run lint
        working-directory: client

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run server tests
        run: npm test -- --runInBand
        working-directory: server

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      env_name: ${{ steps.vars.outputs.env_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive environment variables
        id: vars
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "${BRANCH}" = "vprod" ]; then
            ENV_NAME="vprod"
          elif [ "${BRANCH}" = "vpreprod" ]; then
            ENV_NAME="vpreprod"
          else
            ENV_NAME="vdev"
          fi
          IMAGE_TAG="${BRANCH}-${GITHUB_SHA::7}"
          echo "env_name=${ENV_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: docker build -t api:${{ steps.vars.outputs.image_tag }} ./server

      - name: Build Client image
        run: docker build -t client:${{ steps.vars.outputs.image_tag }} ./client

  push_harbor:
    name: Push images to Harbor
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Pull local build artifacts not available
        run: echo "Build and push happen in separate runners. Rebuild before push."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild API image
        run: docker build -t ${{ env.REGISTRY }}/tiptop-${{ needs.build.outputs.env_name }}/api:${{ needs.build.outputs.image_tag }} ./server

      - name: Rebuild Client image
        run: docker build -t ${{ env.REGISTRY }}/tiptop-${{ needs.build.outputs.env_name }}/client:${{ needs.build.outputs.image_tag }} ./client

      - name: Push API image
        run: docker push ${{ env.REGISTRY }}/tiptop-${{ needs.build.outputs.env_name }}/api:${{ needs.build.outputs.image_tag }}

      - name: Push Client image
        run: docker push ${{ env.REGISTRY }}/tiptop-${{ needs.build.outputs.env_name }}/client:${{ needs.build.outputs.image_tag }}

  backup:
    name: Backup Mongo before deploy
    runs-on: ubuntu-latest
    needs: push_harbor
    steps:
      - name: SSH backup command
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BRANCH="${GITHUB_REF_NAME}"
            if [ "${BRANCH}" = "vprod" ]; then ENV_NAME="vprod"; elif [ "${BRANCH}" = "vpreprod" ]; then ENV_NAME="vpreprod"; else ENV_NAME="vdev"; fi
            /srv/scripts/backup-mongo-restic.sh "${ENV_NAME}"

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: backup
    steps:
      - name: SSH deploy command
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BRANCH="${GITHUB_REF_NAME}"
            if [ "${BRANCH}" = "vprod" ]; then ENV_NAME="vprod"; elif [ "${BRANCH}" = "vpreprod" ]; then ENV_NAME="vpreprod"; else ENV_NAME="vdev"; fi
            export HARBOR_REGISTRY="${{ secrets.HARBOR_REGISTRY }}"
            export HARBOR_USERNAME="${{ secrets.HARBOR_USERNAME }}"
            export HARBOR_PASSWORD="${{ secrets.HARBOR_PASSWORD }}"
            export IMAGE_TAG="${BRANCH}-${GITHUB_SHA::7}"
            /srv/scripts/deploy-tiptop-env.sh "${ENV_NAME}" "${IMAGE_TAG}"
