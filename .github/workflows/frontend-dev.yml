name: Frontend Dev Tests

# Déclenchement du workflow
on:
  push:
    branches:
      - dev

jobs:
  frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Installer Node.js (Vite 7 requiert Node.js 20.19+ ou 22.12+)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3. Installer les dépendances frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # 4. Vérifier le frontend (build + lint)
      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

      # 5. Lancer le serveur de dev (le message du vite.config.js s'affiche dans les logs)
      - name: Lancer le serveur frontend
        working-directory: frontend
        run: |
          npm run dev &
          sleep 8
          curl -s -o /dev/null -w "Status: %{http_code}\n" http://localhost:5173 && echo "✅ Serveur accessible" || echo "⚠️ Vérification du serveur (non bloquant)"
          pkill -f "vite" 2>/dev/null || true