# Lancer un test de restauration Restic (vérifie que le backup est lisible).
# Actions → Trigger restore test → Run workflow → Choisir l'environnement.
name: Trigger restore test

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environnement (dev, preprod, prod)'
        required: true
        type: choice
        options:
          - dev
          - preprod
          - prod
        default: 'dev'

permissions:
  contents: read

jobs:
  restore-test:
    name: Test restauration (${{ github.event.inputs.env }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer kubectl
        env:
          KC_DEV:     ${{ secrets.KUBECONFIG_DEV }}
          KC_PREPROD: ${{ secrets.KUBECONFIG_PREPROD }}
          KC_PROD:    ${{ secrets.KUBECONFIG_PROD }}
        run: |
          ENV="${{ github.event.inputs.env }}"
          case "$ENV" in
            prod)    KC="$KC_PROD";    NS="thetiptop-prod"    ;;
            preprod) KC="$KC_PREPROD"; NS="thetiptop-preprod" ;;
            *)       KC="$KC_DEV";     NS="thetiptop-dev"     ;;
          esac
          if [ -z "$KC" ]; then
            echo "KUBECONFIG manquant pour $ENV."
            exit 1
          fi
          echo "$KC" | base64 -d > kubeconfig
          echo "KUBECONFIG_PATH=$PWD/kubeconfig" >> $GITHUB_ENV
          echo "NAMESPACE=$NS" >> $GITHUB_ENV

      - name: Lancer le job de test de restauration
        id: run
        env:
          KUBECONFIG: ${{ env.KUBECONFIG_PATH }}
        run: |
          NS="${{ env.NAMESPACE }}"
          JOB_NAME="restore-test-$(date +%s)"
          echo "job_name=$JOB_NAME" >> $GITHUB_OUTPUT
          kubectl create job "$JOB_NAME" -n "$NS" --from=cronjob/mongodb-restore-test
          kubectl wait --for=condition=complete job/"$JOB_NAME" -n "$NS" --timeout=600s || true

      - name: Afficher les logs
        if: always()
        env:
          KUBECONFIG: ${{ env.KUBECONFIG_PATH }}
        run: |
          JOB="${{ steps.run.outputs.job_name }}"
          NS="${{ env.NAMESPACE }}"
          if [ -n "$JOB" ]; then
            kubectl logs job/"$JOB" -n "$NS" -c restic-restore-test --tail=100 2>/dev/null || true
            kubectl get job "$JOB" -n "$NS" -o wide 2>/dev/null || true
          fi
