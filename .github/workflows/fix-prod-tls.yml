# Forcer la réémission du certificat TLS prod (thetiptop-jeu.fr + www + api).
# À lancer quand le DNS pointe bien vers le cluster mais le navigateur affiche encore "Non sécurisé".
# Actions → Fix prod TLS certificate → Run workflow.
#
# Prérequis : KUBECONFIG_PROD, cert-manager installé sur le cluster prod
name: Fix prod TLS certificate

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fix-tls:
    name: Réémettre certificat Let's Encrypt (prod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer kubectl (prod)
        env:
          KC: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          if [ -z "$KC" ]; then
            echo "❌ KUBECONFIG_PROD absent."
            exit 1
          fi
          mkdir -p ~/.kube
          echo "$KC" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Supprimer le certificat et le secret TLS prod
        run: |
          NS="thetiptop-prod"
          SECRET="thetiptop-prod-tls"
          echo "Suppression du secret $SECRET et du Certificate associé..."
          kubectl delete secret "$SECRET" -n "$NS" --ignore-not-found=true
          for name in $(kubectl get certificate -n "$NS" -o jsonpath='{.items[?(@.spec.secretName=="thetiptop-prod-tls")].metadata.name}' 2>/dev/null); do
            [ -n "$name" ] && kubectl delete certificate "$name" -n "$NS" --ignore-not-found=true && echo "Certificate $name supprimé"
          done
          echo "Certificat et secret supprimés. cert-manager va réémettre dans 1–2 min."

      - name: Réappliquer l'Ingress prod (déclenche cert-manager)
        run: |
          kubectl apply -f k8s/prod/ingress.yaml
          echo "Ingress réappliqué. Attente 90s pour que cert-manager émette le certificat..."

      - name: Attendre et vérifier le certificat
        run: |
          sleep 90
          echo "=== Certificates dans thetiptop-prod ==="
          kubectl get certificate -n thetiptop-prod
          echo ""
          echo "=== Détail (status) ==="
          kubectl get certificate -n thetiptop-prod -o custom-columns=NAME:.metadata.name,READY:.status.conditions[0].status,REASON:.status.conditions[0].reason 2>/dev/null || true
          if kubectl get secret thetiptop-prod-tls -n thetiptop-prod 2>/dev/null; then
            echo ""
            echo "✅ Secret thetiptop-prod-tls présent. Teste https://thetiptop-jeu.fr et https://www.thetiptop-jeu.fr en navigation privée."
          else
            echo "⏳ Secret pas encore créé. Attendre 1–2 min puis réessayer l’URL. Vérifier : kubectl describe certificate -n thetiptop-prod"
          fi
