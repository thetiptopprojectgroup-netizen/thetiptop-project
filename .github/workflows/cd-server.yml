# Déclenché quand CI - Server (Backend) se termine.
# Crée la PR dev→preprod ou preprod→prod uniquement si CI Server ET CI Client sont verts.
name: CD - Server (Backend)

on:
  workflow_run:
    workflows: ["CI - Server (Backend)"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  cd-server:
    name: CD Server (Backend)
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      contains(fromJSON('["dev", "preprod", "prod"]'), github.event.workflow_run.head_branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier les 2 CI puis créer la PR si besoin
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.workflow_run.head_branch;
            const head_sha = context.payload.workflow_run.head_sha;

            if (branch === 'prod') {
              core.info('Branche prod : rien à promouvoir.');
              return;
            }

            const { data: { workflows } } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const serverCi = workflows.find(w => w.name === 'CI - Server (Backend)');
            const clientCi = workflows.find(w => w.name === 'CI - Client (Frontend)');
            if (!serverCi || !clientCi) {
              core.setFailed('Workflows CI introuvables.');
              return;
            }

            const getRuns = async (workflowId) => {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, workflow_id: workflowId, branch, per_page: 20
              });
              return data.workflow_runs || [];
            };
            const serverRuns = await getRuns(serverCi.id);
            const clientRuns = await getRuns(clientCi.id);
            const serverRun = serverRuns.find(r => r.head_sha === head_sha);
            const clientRun = clientRuns.find(r => r.head_sha === head_sha);

            if (!serverRun || serverRun.conclusion !== 'success') {
              core.setFailed('CI Server pas encore OK pour ce commit.');
              return;
            }
            if (!clientRun || clientRun.conclusion !== 'success') {
              core.setFailed('CI Client pas encore OK pour ce commit.');
              return;
            }

            const base = branch === 'dev' ? 'preprod' : 'prod';
            const head = branch;
            let { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open', base, head: owner + ':' + head
            });
            if (pulls.length > 0) {
              core.info(`PR ${head} → ${base} déjà existante: #${pulls[0].number}`);
              return;
            }
            const title = branch === 'dev' ? '🚀 Promotion dev → preprod' : '🎯 Promotion preprod → prod';
            const body = branch === 'dev'
              ? 'Promotion automatique : CI Server et CI Client ont réussi sur `dev`.'
              : 'Mise en production : CI Server et CI Client ont réussi sur `preprod`.';
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo, head, base, title, body,
                draft: branch !== 'dev'
              });
              core.info(`PR ${head} → ${base} créée: #${pr.number}`);
            } catch (err) {
              if (err.status === 422 && err.message && err.message.includes('already exists')) {
                core.info('PR déjà existante (ignoré).');
              } else {
                throw err;
              }
            }
