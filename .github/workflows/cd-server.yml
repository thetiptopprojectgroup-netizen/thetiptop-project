# CrÃ©e la PR devâ†’preprod ou preprodâ†’prod quand CI Server ET CI Client sont verts.
# DÃ©clenchÃ© par : fin du CI Server (workflow_run) OU push sur dev/preprod/prod.
# Note : workflow_run exÃ©cute ce workflow depuis la branche par dÃ©faut (ex. main).
# Si les CD ne se dÃ©clenchent pas, mergez ce fichier sur la branche par dÃ©faut.
name: CD - Server (Backend)

on:
  push:
    branches:
      - dev
      - preprod
      - prod
  workflow_run:
    workflows: ["CI - Server (Backend)"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  cd-server:
    name: CD Server (Backend)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && contains(fromJSON('["dev", "preprod", "prod"]'), github.ref_name)) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && contains(fromJSON('["dev", "preprod", "prod"]'), github.event.workflow_run.head_branch))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: VÃ©rifier les 2 CI puis crÃ©er la PR si besoin
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isPush = context.eventName === 'push';
            const branch = isPush ? context.ref.replace('refs/heads/', '') : context.payload.workflow_run.head_branch;
            const head_sha = isPush ? context.sha : context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (branch === 'prod') {
              core.info('Branche prod : rien Ã  promouvoir.');
              return;
            }

            const { data: { workflows } } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const serverCi = workflows.find(w => w.name === 'CI - Server (Backend)');
            const clientCi = workflows.find(w => w.name === 'CI - Client (Frontend)');
            if (!serverCi || !clientCi) {
              core.setFailed('Workflows CI introuvables.');
              return;
            }

            const getRuns = async (workflowId) => {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, workflow_id: workflowId, branch, per_page: 20
              });
              return data.workflow_runs || [];
            };
            const serverRuns = await getRuns(serverCi.id);
            const clientRuns = await getRuns(clientCi.id);
            const serverRun = serverRuns.find(r => r.head_sha === head_sha);
            const clientRun = clientRuns.find(r => r.head_sha === head_sha);

            if (serverRun?.conclusion === 'failure' || clientRun?.conclusion === 'failure') {
              core.setFailed('CI Server ou CI Client en Ã©chec pour ce commit.');
              return;
            }
            if (serverRun?.conclusion !== 'success' || clientRun?.conclusion !== 'success') {
              if (isPush) {
                core.info('Les 2 CI ne sont pas encore terminÃ©es. La PR sera crÃ©Ã©e quand les 2 CI auront rÃ©ussi (relancer le workflow CD ou workflow_run).');
                return;
              }
              if (!serverRun || serverRun.conclusion !== 'success') {
                core.setFailed('CI Server pas encore OK pour ce commit.');
                return;
              }
              core.setFailed('CI Client pas encore OK pour ce commit.');
              return;
            }

            const base = branch === 'dev' ? 'preprod' : 'prod';
            const head = branch;
            let { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open', base, head: owner + ':' + head
            });
            if (pulls.length > 0) {
              core.info(`PR ${head} â†’ ${base} dÃ©jÃ  existante: #${pulls[0].number}`);
              return;
            }
            const title = branch === 'dev' ? 'ðŸš€ Promotion dev â†’ preprod' : 'ðŸŽ¯ Promotion preprod â†’ prod';
            const body = branch === 'dev'
              ? 'Promotion automatique : CI Server et CI Client ont rÃ©ussi sur `dev`.'
              : 'Mise en production : CI Server et CI Client ont rÃ©ussi sur `preprod`.';
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo, head, base, title, body,
                draft: branch !== 'dev'
              });
              core.info(`PR ${head} â†’ ${base} crÃ©Ã©e: #${pr.number}`);
            } catch (err) {
              if (err.status === 422 && err.message && err.message.includes('already exists')) {
                core.info('PR dÃ©jÃ  existante (ignorÃ©).');
              } else {
                throw err;
              }
            }
