# Cr√©e la PR dev‚Üípreprod ou preprod‚Üíprod quand CI Server ET CI Client sont verts.
# D√©clench√© par : push (dev/preprod/prod) ou manuellement (workflow_dispatch).
# Sans workflow_run pour que la colonne Branch affiche dev / preprod / prod en bleu.
name: CD - Server (Backend)

# D√©clench√© par push, √Ý la fin de chaque CI (workflow_run), ou manuellement.
# workflow_run : quand une des 2 CI se termine, on rev√©rifie les 2 ; si les 2 sont vertes, on cr√©e la PR.
on:
  push:
    branches:
      - dev
      - preprod
      - prod
  workflow_run:
    workflows: ["CI - Server (Backend)", "CI - Client (Frontend)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      promote:
        description: 'Promouvoir (cr√©er la PR dev‚Üípreprod ou preprod‚Üíprod si les 2 CI sont vertes)'
        required: false
        default: 'oui'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  cd-server:
    name: CD Server (Backend)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'push' && contains(fromJSON('["dev", "preprod", "prod"]'), github.ref_name))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: V√©rifier les 2 CI puis cr√©er la PR si besoin
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Branche et SHA : depuis le push/dispatch ou depuis le workflow_run qui nous a d√©clench√©s
            const isPushOrDispatch = context.eventName === 'push' || context.eventName === 'workflow_dispatch';
            const branch = isPushOrDispatch ? context.ref.replace('refs/heads/', '') : context.payload.workflow_run.head_branch;
            const head_sha = isPushOrDispatch ? context.sha : context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (branch === 'prod') {
              core.info('Branche prod : rien √Ý promouvoir.');
              return;
            }

            const { data: { workflows } } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const serverCi = workflows.find(w => w.name === 'CI - Server (Backend)');
            const clientCi = workflows.find(w => w.name === 'CI - Client (Frontend)');
            if (!serverCi || !clientCi) {
              core.setFailed('Workflows CI introuvables.');
              return;
            }

            const getRuns = async (workflowId) => {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, workflow_id: workflowId, branch, per_page: 20
              });
              return data.workflow_runs || [];
            };
            const [serverRuns, clientRuns] = await Promise.all([getRuns(serverCi.id), getRuns(clientCi.id)]);
            const serverRun = serverRuns.find(r => r.head_sha === head_sha);
            const clientRun = clientRuns.find(r => r.head_sha === head_sha);

            // 1) Au moins une CI en √©chec ‚Üí on fait √©chouer le job
            if (serverRun?.conclusion === 'failure' || clientRun?.conclusion === 'failure') {
              core.setFailed('CI Server ou CI Client en √©chec pour ce commit.');
              return;
            }
            // 2) Les deux ne sont pas encore en succ√®s (en cours ou pas trouv√©es) ‚Üí succ√®s sans PR (l‚Äôautre CI relancera le CD)
            if (serverRun?.conclusion !== 'success' || clientRun?.conclusion !== 'success') {
              core.info('Les 2 CI ne sont pas encore toutes les deux en succ√®s. Aucune PR cr√©√©e ; le CD sera relanc√© √Ý la fin de l‚Äôautre CI.');
              return;
            }

            // 3) Les deux CI sont vertes ‚Üí cr√©er la PR dev‚Üípreprod ou preprod‚Üíprod
            const base = branch === 'dev' ? 'preprod' : 'prod';
            const head = branch;
            let { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open', base, head: owner + ':' + head
            });
            if (pulls.length > 0) {
              core.info(`PR ${head} ‚Üí ${base} d√©j√Ý existante: #${pulls[0].number}`);
              return;
            }
            const title = branch === 'dev' ? 'üöÄ Promotion dev ‚Üí preprod' : 'üéØ Promotion preprod ‚Üí prod';
            const body = branch === 'dev'
              ? 'Promotion automatique : CI Server et CI Client ont r√©ussi sur `dev`.'
              : 'Mise en production : CI Server et CI Client ont r√©ussi sur `preprod`.';
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo, head, base, title, body,
                draft: branch !== 'dev'
              });
              core.info(`PR ${head} ‚Üí ${base} cr√©√©e: #${pr.number}`);
            } catch (err) {
              if (err.status === 422 && err.message && err.message.includes('already exists')) {
                core.info('PR d√©j√Ý existante (ignor√©).');
              } else {
                throw err;
              }
            }
