# -----------------------------------------------------------------------------
# CD — Branche vdev : Harbor → images → VPS
# Déclenchement : **push** sur `vdev` puis attente dans le job `gate` que la CI Monorepo
# soit **terminée avec succès** sur le même commit (évite de déployer si les tests échouent).
# `workflow_dispatch` : déploiement manuel. (On n’utilise pas `workflow_run` seul : il exige
# que ce fichier soit sur la **branche par défaut** GitHub, sinon le CD ne part jamais.)
# Secrets : HARBOR_REGISTRY_BASE, HARBOR_ADMIN_PASSWORD, HARBOR_USERNAME/PASSWORD,
#           VPS_HOST, VPS_SSH_USER, VPS_SSH_KEY,
#           VDEV_ENV_FILE (ou alias VDEV_ENV) — contenu multiligne de vdev.env ; optionnel : VDEV_ENV_FILE_B64
#           Monitoring (Grafana, un seul secret pour tout le VPS) : MONITORING_GRAFANA_ADMIN_PASSWORD
#           ou MONITORING_ENV_FILE / MONITORING_ENV_FILE_B64 (comme VDEV_ENV_FILE)
#           Logs (Kibana / Elasticsearch) : LOGGING_ELASTIC_PASSWORD ou LOGGING_ENV_FILE / _B64
#           HARBOR_USERNAME / HARBOR_PASSWORD — aussi utilisés sur le VPS pour docker login avant pull
# -----------------------------------------------------------------------------
name: CD / vdev

on:
  push:
    branches: [vdev]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-vdev
  # false : deux déclenchements rapides (même commit) ne s’annulent pas au moment du checkout.
  cancel-in-progress: false

env:
  HARBOR_PROJECT: vdev
  VITE_API_URL: https://vdev.dsp5-archi-o22a-15m-g3.fr/api
  SITE_URL: https://vdev.dsp5-archi-o22a-15m-g3.fr

jobs:
  gate:
    name: "0 · CI Monorepo verte sur ce commit (ou manuel)"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.gate.outputs.sha }}
      ok: ${{ steps.gate.outputs.ok }}
    steps:
      - name: Vérifier / attendre la CI
        id: gate
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ciName = 'CI — Monorepo (server + client)';
            const target = 'vdev';
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('sha', context.sha);
              core.setOutput('ok', 'true');
              core.info('Déploiement manuel : pas d’attente CI.');
              return;
            }
            const sha = context.sha;
            const branch = context.ref.replace(/^refs\/heads\//, '');
            if (branch !== target) {
              core.setOutput('sha', '');
              core.setOutput('ok', 'false');
              return;
            }
            core.info(`Attente CI « ${ciName} » verte pour ${sha.slice(0, 7)}…`);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxAttempts = 90;
            const delayMs = 10000;
            for (let i = 0; i < maxAttempts; i++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: sha,
                per_page: 30,
              });
              const relevant = (data.workflow_runs || []).filter(
                (w) =>
                  w.name === ciName &&
                  w.head_branch === target &&
                  (w.event === 'push' || w.event === 'pull_request')
              );
              if (relevant.length === 0) {
                core.info(`Run CI pas encore visible (tentative ${i + 1}/${maxAttempts})`);
                await new Promise((r) => setTimeout(r, delayMs));
                continue;
              }
              const pending = relevant.filter((w) => w.status !== 'completed');
              if (pending.length > 0) {
                core.info(
                  `CI en cours : ${pending.map((p) => `${p.event}:${p.status}`).join(', ')} (tentative ${i + 1}/${maxAttempts})`
                );
                await new Promise((r) => setTimeout(r, delayMs));
                continue;
              }
              const okRun = relevant.find((w) => w.conclusion === 'success');
              if (okRun) {
                core.setOutput('sha', sha);
                core.setOutput('ok', 'true');
                return;
              }
              const worst = relevant.find((w) => w.conclusion && w.conclusion !== 'skipped') || relevant[0];
              core.setOutput('sha', sha);
              core.setOutput('ok', 'false');
              core.setFailed(`CI Monorepo en échec (${worst.conclusion}) — déploiement annulé.`);
              return;
            }
            core.setOutput('sha', '');
            core.setOutput('ok', 'false');
            core.setFailed('Timeout : la CI Monorepo n’a pas fini à temps — déploiement annulé.');

  # ---------------------------------------------------------------------------
  # Stage 1 — Projet Harbor (API admin, idempotent)
  # ---------------------------------------------------------------------------
  harbor-project:
    name: "1 · Harbor — projet vdev"
    needs: [gate]
    if: needs.gate.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ needs.gate.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Créer le projet s'il n'existe pas
        env:
          HARBOR_URL: https://${{ secrets.HARBOR_REGISTRY_BASE }}
          HARBOR_ADMIN_USER: ${{ secrets.HARBOR_ADMIN_USER }}
          HARBOR_ADMIN_PASSWORD: ${{ secrets.HARBOR_ADMIN_PASSWORD }}
          HARBOR_PROJECT_NAME: ${{ env.HARBOR_PROJECT }}
        run: bash infra/scripts/ensure-harbor-project.sh

  # ---------------------------------------------------------------------------
  # Stage 2 — Build & push vers le registre
  # ---------------------------------------------------------------------------
  build-and-push:
    name: "2 · Registry — build & push images"
    needs: [harbor-project]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      sha: ${{ needs.harbor-project.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.harbor-project.outputs.sha }}

      - name: Docker login (robot)
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          LOGIN_SERVER="${REGISTRY%%/*}"
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "${LOGIN_SERVER}" \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build & push API
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          SHA="${{ needs.harbor-project.outputs.sha }}"
          docker build -t "${REGISTRY}/api:${SHA}" -f server/Dockerfile server
          docker push "${REGISTRY}/api:${SHA}"

      - name: Build & push client (Vite)
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
          SHA: ${{ needs.harbor-project.outputs.sha }}
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          LASTMOD_DATE="$(git log -1 --format=%cs)"
          docker build \
            --target production \
            --build-arg VITE_API_URL="${{ env.VITE_API_URL }}" \
            --build-arg SITE_URL="${{ env.SITE_URL }}" \
            --build-arg LASTMOD_DATE="${LASTMOD_DATE}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID}" \
            --build-arg VITE_GA_MEASUREMENT_ID="${VITE_GA_MEASUREMENT_ID}" \
            -t "${REGISTRY}/client:${SHA}" \
            -f client/Dockerfile client
          docker push "${REGISTRY}/client:${SHA}"

  # ---------------------------------------------------------------------------
  # Stage 3 — Déploiement sur le VPS
  # ---------------------------------------------------------------------------
  deploy-vps:
    name: "3 · VPS — rsync & docker compose"
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      sha: ${{ needs.build-and-push.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-and-push.outputs.sha }}

      - name: Écrire vdev.env sur le VPS + sync + compose
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VDEV_ENV_FILE: ${{ secrets.VDEV_ENV_FILE || secrets.VDEV_ENV }}
          VDEV_ENV_FILE_B64: ${{ secrets.VDEV_ENV_FILE_B64 }}
          MONITORING_ENV_FILE: ${{ secrets.MONITORING_ENV_FILE }}
          MONITORING_ENV_FILE_B64: ${{ secrets.MONITORING_ENV_FILE_B64 }}
          MONITORING_GRAFANA_ADMIN_PASSWORD: ${{ secrets.MONITORING_GRAFANA_ADMIN_PASSWORD }}
          LOGGING_ENV_FILE: ${{ secrets.LOGGING_ENV_FILE }}
          LOGGING_ENV_FILE_B64: ${{ secrets.LOGGING_ENV_FILE_B64 }}
          LOGGING_ELASTIC_PASSWORD: ${{ secrets.LOGGING_ELASTIC_PASSWORD }}
          LOGGING_KIBANA_HOST: ${{ secrets.LOGGING_KIBANA_HOST }}
          LOGGING_ADMIN_PASSWORD: ${{ secrets.LOGGING_ADMIN_PASSWORD }}
          LOGGING_KIBANA_SYSTEM_PASSWORD: ${{ secrets.LOGGING_KIBANA_SYSTEM_PASSWORD }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_REGISTRY_HOST_RAW: ${{ secrets.HARBOR_REGISTRY_BASE }}
        run: |
          set -euo pipefail
          if [ -n "${VDEV_ENV_FILE_B64:-}" ]; then
            CONTENT="$(printf '%s' "$VDEV_ENV_FILE_B64" | base64 -d)"
          elif [ -n "${VDEV_ENV_FILE:-}" ]; then
            CONTENT="$VDEV_ENV_FILE"
          else
            echo "::error::Aucun secret d’environnement pour le déploiement. Créez un secret de dépôt (Settings → Secrets and variables → Actions → New repository secret) nommé VDEV_ENV_FILE et collez-y tout le texte de votre fichier local infra/deploy/env/vdev.env (rempli à partir de vdev.env.example). Alias accepté : VDEV_ENV. Si les caractères posent problème : base64 -w0 vdev.env puis secret VDEV_ENV_FILE_B64. Les Variables du dépôt ne remplacent pas les Secrets pour ce champ."
            exit 1
          fi
          # CRLF (Windows) dans le secret casse les règles Traefik (Host(`…`) devient invalide)
          CONTENT="$(printf '%s' "$CONTENT" | tr -d '\r')"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          REMOTE="${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}"
          SSH_BASE=(ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          "${SSH_BASE[@]}" "$REMOTE" "mkdir -p /opt/thetiptop/app/infra/deploy/env"
          printf '%s\n' "$CONTENT" | "${SSH_BASE[@]}" "$REMOTE" "cat > /opt/thetiptop/app/infra/deploy/env/vdev.env"
          "${SSH_BASE[@]}" "$REMOTE" "chmod 600 /opt/thetiptop/app/infra/deploy/env/vdev.env"
          source infra/deploy/ci-write-remote-monitoring-env.sh
          source infra/deploy/ci-write-remote-logging-env.sh
          RSYNC_SSH='ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes'
          export RSYNC_SSH
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'client/node_modules' \
            --exclude 'server/node_modules' \
            --exclude 'infra/deploy/env/*.env' \
            --exclude 'infra/monitoring/.env' \
            --exclude 'infra/logging/.env' \
            -e "$RSYNC_SSH" \
            ./ "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}:/opt/thetiptop/app/"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST_RAW#https://}"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST#http://}"
          HARBOR_REGISTRY_HOST="${HARBOR_REGISTRY_HOST%%/*}"
          printf '%s\n' "$HARBOR_PASSWORD" | "${SSH_BASE[@]}" "$REMOTE" \
            "docker login \"$HARBOR_REGISTRY_HOST\" -u \"$HARBOR_USERNAME\" --password-stdin"
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail
             cd /opt/thetiptop/app
             export REGISTRY='${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}'
             export IMAGE_TAG='${{ needs.build-and-push.outputs.sha }}'
             docker compose -f infra/deploy/docker-compose.stack.yml \
               --env-file infra/deploy/env/vdev.env \
               up -d --remove-orphans
             bash infra/deploy/seed-app-users.sh /opt/thetiptop/app infra/deploy/env/vdev.env
             bash infra/deploy/apply-traefik-minio-from-app.sh /opt/thetiptop/app
             bash infra/deploy/apply-monitoring-from-app.sh /opt/thetiptop/app
             bash infra/deploy/apply-logging-from-app.sh /opt/thetiptop/app"

      - name: Restic — crons (Ansible depuis le runner, sans SSH manuel sur le VPS)
        run: bash infra/deploy/run-ansible-restic.sh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

  # ---------------------------------------------------------------------------
  # Stage 4 — Ouvre une PR vdev → vpreprod (brouillon) après CD vert.
  # Aucun merge automatique : vous validez sur GitHub (« Ready for review » puis Merge).
  # Même principe que la PR vpreprod → vprod dans deploy-vpreprod.yml.
  # ---------------------------------------------------------------------------
  promotion-pr:
    name: "4 · PR promotion → vpreprod"
    needs: [deploy-vps]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Ouvrir PR vdev → vpreprod si absente
        uses: actions/github-script@v8
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHORT: ${{ needs.deploy-vps.outputs.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const base = 'vpreprod';
            const headBranch = 'vdev';
            const runUrl = process.env.RUN_URL;
            const sha = (process.env.COMMIT_SHORT || '').slice(0, 7);

            // Branche de base obligatoire sur GitHub (sinon API : field base invalid)
            try {
              await github.rest.repos.getBranch({ owner, repo, branch: base });
            } catch (e) {
              if (e.status !== 404) throw e;
              const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
              const def = repoInfo.default_branch;
              if (def === headBranch) {
                core.setFailed(
                  `La branche « ${base} » n’existe pas sur le dépôt. Crée-la une fois sur GitHub ` +
                    `(onglet Code → branche « ${def} » → déroulant des branches → New branch → nom « ${base} »), ` +
                    `puis relance ce job ou pousse à nouveau sur « ${headBranch} ».`
                );
                return;
              }
              const { data: refData } = await github.rest.git.getRef({
                owner, repo,
                ref: `heads/${def}`,
              });
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/heads/${base}`,
                sha: refData.object.sha,
              });
              core.info(`Branche « ${base} » créée (même pointeur que « ${def} »).`);
            }

            const { data: open } = await github.rest.pulls.list({
              owner, repo, state: 'open', base, per_page: 100,
            });
            const exists = open.some(
              (p) => p.head.ref === headBranch && p.base.ref === base
            );
            if (exists) {
              const pr = open.find((p) => p.head.ref === headBranch);
              core.info(`PR déjà ouverte${pr ? ` (#${pr.number})` : ''}.`);
              return;
            }

            const body = [
              '## Promotion vers vpreprod',
              '',
              'Cette PR est en **brouillon** : cliquez **Ready for review** quand vous validez, puis **Merge**.',
              '',
              '1. Vérifier sur **vdev** si besoin.',
              '2. **Merge** → lance le CD **vpreprod**.',
              '',
              '---',
              '',
              '**Ouverture automatique de la PR** seulement (après déploiement vdev réussi) — **pas de fusion automatique**.',
              '',
              `- Run : [CD / vdev](${runUrl})`,
              `- Commit : \`${sha}\``,
            ].join('\n');

            try {
              const { data: created } = await github.rest.pulls.create({
                owner, repo,
                head: headBranch,
                base,
                title: '[Promotion] vdev → vpreprod',
                body,
                draft: true,
              });
              core.info(`PR créée : #${created.number}`);
            } catch (err) {
              if (err.status !== 422) throw err;
              const raw = err.response?.data || {};
              const msg = JSON.stringify(raw).toLowerCase();
              const errors = Array.isArray(raw.errors) ? raw.errors : [];
              const errText = errors.map((e) => (e.message || e.code || '')).join(' ').toLowerCase();
              const combined = `${msg} ${errText}`;
              // API GitHub : ex. « No commits between vpreprod and vdev » quand les deux branches sont au même commit
              if (
                combined.includes('no commits') ||
                combined.includes('nothing to compare')
              ) {
                core.info(
                  'Aucune PR à ouvrir : pas de différence entre vdev et vpreprod (souvent le même commit). ' +
                    'C’est attendu après un merge de promotion ou si vpreprod a été alignée sur vdev.'
                );
                return;
              }
              if (combined.includes('already exists') || combined.includes('pull request already')) {
                core.info('Une PR existe déjà pour ce couple de branches (réponse API 422).');
                return;
              }
              core.error(`GitHub API 422 : ${JSON.stringify(raw)}`);
              throw err;
            }
