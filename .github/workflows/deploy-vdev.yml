# Déploiement **manuel** seul (sans refaire la CI). Le flux push → CI → CD passe par `ci-pipeline.yml`.
# -----------------------------------------------------------------------------
name: CD / vdev

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-vdev-manual
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-vdev-reusable.yml
    secrets: inherit
    with:
      commit_sha: ${{ github.sha }}
