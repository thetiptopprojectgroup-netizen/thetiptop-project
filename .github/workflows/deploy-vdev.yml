# -----------------------------------------------------------------------------
# CD — Branche vdev : Harbor → images → VPS
# Secrets : HARBOR_REGISTRY_BASE, HARBOR_ADMIN_PASSWORD, HARBOR_USERNAME/PASSWORD,
#           VPS_HOST, VPS_SSH_USER, VPS_SSH_KEY, VDEV_ENV_FILE (contenu multiligne de vdev.env)
# -----------------------------------------------------------------------------
name: CD / vdev

on:
  push:
    branches: [vdev]

permissions:
  contents: read

concurrency:
  group: deploy-vdev
  cancel-in-progress: true

env:
  HARBOR_PROJECT: vdev
  VITE_API_URL: https://vdev.dsp5-archi-o22a-15m-g3.fr/api

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — Projet Harbor (API admin, idempotent)
  # ---------------------------------------------------------------------------
  harbor-project:
    name: "1 · Harbor — projet vdev"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Créer le projet s'il n'existe pas
        env:
          HARBOR_URL: https://${{ secrets.HARBOR_REGISTRY_BASE }}
          HARBOR_ADMIN_USER: ${{ secrets.HARBOR_ADMIN_USER }}
          HARBOR_ADMIN_PASSWORD: ${{ secrets.HARBOR_ADMIN_PASSWORD }}
          HARBOR_PROJECT_NAME: ${{ env.HARBOR_PROJECT }}
        run: bash infra/scripts/ensure-harbor-project.sh

  # ---------------------------------------------------------------------------
  # Stage 2 — Build & push vers le registre
  # ---------------------------------------------------------------------------
  build-and-push:
    name: "2 · Registry — build & push images"
    needs: [harbor-project]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login (robot)
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          LOGIN_SERVER="${REGISTRY%%/*}"
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "${LOGIN_SERVER}" \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build & push API
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          docker build -t "${REGISTRY}/api:${{ github.sha }}" -f server/Dockerfile server
          docker push "${REGISTRY}/api:${{ github.sha }}"

      - name: Build & push client (Vite)
        run: |
          REGISTRY="${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}"
          docker build \
            --build-arg VITE_API_URL="${{ env.VITE_API_URL }}" \
            -t "${REGISTRY}/client:${{ github.sha }}" \
            -f client/Dockerfile client
          docker push "${REGISTRY}/client:${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Stage 3 — Déploiement sur le VPS
  # ---------------------------------------------------------------------------
  deploy-vps:
    name: "3 · VPS — rsync & docker compose"
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Écrire vdev.env sur le VPS + sync + compose
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VDEV_ENV_FILE: ${{ secrets.VDEV_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${VDEV_ENV_FILE:-}" ]; then
            echo "::error::Secret VDEV_ENV_FILE manquant ou vide. Collez le contenu complet de infra/deploy/env/vdev.env (d’après vdev.env.example, secrets remplis) dans Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          REMOTE="${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}"
          SSH_BASE=(ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes)
          "${SSH_BASE[@]}" "$REMOTE" "mkdir -p /opt/thetiptop/app/infra/deploy/env"
          printf '%s\n' "$VDEV_ENV_FILE" | "${SSH_BASE[@]}" "$REMOTE" "cat > /opt/thetiptop/app/infra/deploy/env/vdev.env"
          "${SSH_BASE[@]}" "$REMOTE" "chmod 600 /opt/thetiptop/app/infra/deploy/env/vdev.env"
          RSYNC_SSH='ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes'
          export RSYNC_SSH
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'client/node_modules' \
            --exclude 'server/node_modules' \
            --exclude 'infra/deploy/env/*.env' \
            -e "$RSYNC_SSH" \
            ./ "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}:/opt/thetiptop/app/"
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail
             cd /opt/thetiptop/app
             export REGISTRY='${{ secrets.HARBOR_REGISTRY_BASE }}/${{ env.HARBOR_PROJECT }}'
             export IMAGE_TAG='${{ github.sha }}'
             docker compose -f infra/deploy/docker-compose.stack.yml \
               --env-file infra/deploy/env/vdev.env \
               up -d --remove-orphans"
