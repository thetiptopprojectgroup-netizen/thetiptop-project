# Réinitialiser le volume MinIO (une fois) en preprod/prod en cas d'erreur "xl meta version 3".
# À lancer depuis GitHub Actions → Reset MinIO volume → Run workflow (choisir preprod ou prod).
# Ensuite les PR / push déploient normalement sans toucher au volume.
#
# Prérequis : KUBECONFIG_PREPROD et/ou KUBECONFIG_PROD
name: Reset MinIO volume (preprod / prod)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement à réinitialiser'
        required: true
        type: choice
        options:
          - preprod
          - prod

permissions:
  contents: read

jobs:
  reset:
    name: Reset MinIO → ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer kubectl
        id: kube
        env:
          KC_PREPROD: ${{ secrets.KUBECONFIG_PREPROD }}
          KC_PROD:    ${{ secrets.KUBECONFIG_PROD }}
        run: |
          case "$ENV" in
            prod)    KC="$KC_PROD" ;;
            preprod) KC="$KC_PREPROD" ;;
            *)       echo "Env non géré: $ENV"; exit 1 ;;
          esac
          if [ -z "$KC" ]; then
            echo "❌ KUBECONFIG non configuré pour $ENV."
            exit 1
          fi
          mkdir -p ~/.kube
          echo "$KC" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Arrêter MinIO et supprimer le volume
        run: |
          kubectl scale deployment minio -n minio --replicas=0
          echo "Attente libération des pods (30s)..."
          sleep 30
          kubectl delete pvc minio-data -n minio --ignore-not-found=true
          echo "Volume supprimé. Redéploiement MinIO..."

      - name: Redéployer MinIO (namespace, configmap, deployment, ingress)
        env:
          RESTIC_S3_ACCESS_KEY_ID: ${{ secrets.RESTIC_S3_ACCESS_KEY_ID }}
          RESTIC_S3_SECRET_ACCESS_KEY: ${{ secrets.RESTIC_S3_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$RESTIC_S3_ACCESS_KEY_ID" ] || [ -z "$RESTIC_S3_SECRET_ACCESS_KEY" ]; then
            echo "❌ Secrets MinIO absents. Configure RESTIC_S3_ACCESS_KEY_ID et RESTIC_S3_SECRET_ACCESS_KEY."
            exit 1
          fi
          kubectl apply -f k8s/minio/namespace.yaml
          kubectl apply -f k8s/minio/nginx-configmap.yaml
          kubectl create secret generic minio-credentials --namespace=minio \
            --from-literal=root-user="$RESTIC_S3_ACCESS_KEY_ID" \
            --from-literal=root-password="$RESTIC_S3_SECRET_ACCESS_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

          if [ "$ENV" = "prod" ]; then
            MINIO_HOST="minio.thetiptop-jeu.fr"
          else
            MINIO_HOST="minio.${ENV}.thetiptop-jeu.fr"
          fi
          sed -e "s|MINIO_PUBLIC_HOST_PLACEHOLDER|$MINIO_HOST|g" k8s/minio/deployment.yaml | kubectl apply -f -
          sed -e "s|MINIO_HOST_PLACEHOLDER|$MINIO_HOST|g" k8s/minio/ingress.yaml | kubectl apply -f -

          echo "✅ MinIO redéployé avec volume neuf. Console: https://$MINIO_HOST/console/"

      - name: Vérifier le pod MinIO
        run: |
          echo "Attente du pod MinIO (max 2 min)..."
          kubectl wait --for=condition=ready pod -l app=minio -n minio --timeout=120s || true
          kubectl get pods -n minio
          echo "Si le pod est 2/2 Running, ouvre la console MinIO pour cet environnement."
