# Kibana routing via Traefik file provider.
# Kibana binds 127.0.0.1:15601 on the host; Traefik reaches it via host.docker.internal.
http:
  routers:
    kibana-logging:
      rule: "Host(`kibana.dsp5-archi-o22a-15m-g3.fr`)"
      entryPoints:
        - websecure
      service: kibana-logging-svc
      tls:
        certResolver: le
      priority: 30
  services:
    kibana-logging-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:15601"
