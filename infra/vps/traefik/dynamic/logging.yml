# Kibana (stack infra/logging/docker-compose.yml).
# Single source of truth for routing via Traefik file provider
# (avoids Docker-provider drift causing intermittent 404/502).
http:
  routers:
    kibana-logging:
      rule: "Host(`kibana.dsp5-archi-o22a-15m-g3.fr`)"
      entryPoints:
        - websecure
      service: kibana-logging-svc
      tls:
        certResolver: le
      priority: 30
  services:
    kibana-logging-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:15601"
