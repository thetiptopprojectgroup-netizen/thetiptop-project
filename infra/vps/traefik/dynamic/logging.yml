# Kibana (stack infra/logging/docker-compose.yml).
# Fallback file-provider route to avoid 404 when Traefik Docker provider is unavailable.
http:
  routers:
    kibana-logging:
      rule: "Host(`kibana.dsp5-archi-o22a-15m-g3.fr`)"
      entryPoints:
        - websecure
      service: kibana-logging-svc
      tls:
        certResolver: le
      priority: 30
  services:
    kibana-logging-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://thetiptop-kibana:5601"
