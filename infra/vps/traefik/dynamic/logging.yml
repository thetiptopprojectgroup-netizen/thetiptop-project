# Kibana (stack infra/logging/docker-compose.yml). Elasticsearch reste sur le réseau interne uniquement.
http:
  routers:
    kibana-logging:
      rule: "Host(`kibana.dsp5-archi-o22a-15m-g3.fr`)"
      entryPoints:
        - websecure
      service: kibana-logging-svc
      tls:
        certResolver: le
      priority: 30
  services:
    kibana-logging-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          # Conteneur sur le réseau « traefik » (voir apply-logging-from-app.sh : docker network connect).
          - url: "http://thetiptop-kibana:5601"
