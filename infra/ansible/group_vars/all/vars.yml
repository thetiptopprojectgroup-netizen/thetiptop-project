---
# Copier vers vars.yml et adapter. Secrets sensibles : ansible-vault (vault.yml).

# Utilisateur Linux à ajouter au groupe docker (optionnel, ex. deploy)
deploy_user: ""

# --- Pare-feu (UFW) ---
firewall_enabled: true
firewall_ssh_port: 22
firewall_allowed_tcp_ports:
  - "22"
  - "80"
  - "443"
  - "8080"
  - "8443"
  - "9000"
  - "9001"

# --- Traefik ---
traefik_acme_email: "thetiptopprojectgroup@gmail.com"
traefik_dashboard_enabled: false
# Route Harbor via fichier dynamic (si le provider Docker Traefik échoue avec Docker Engine récent)
traefik_harbor_hostname: ""  # ex. harbor.mondomaine.fr
traefik_harbor_backend: "nginx"

# --- MinIO ---
# Image Docker (tag complet sur https://hub.docker.com/r/minio/minio/tags )
minio_image: "minio/minio:latest"
minio_root_user: "admin"
minio_root_password: "thetiptop"
minio_data_path: "/opt/thetiptop/minio/data"
# HTTPS via Traefik ; isolation vdev / vpreprod / vprod = buckets S3 distincts.
# DNS : enregistrements A (ou CNAME) vers l’IP publique du VPS :
#   - minio.dsp5… → console web MinIO (racine https://minio…/, pas /console)
#   - restic.dsp5… → API S3 (Restic, clients distants) — voir minio_s3_hostname
minio_traefik_hostname: "minio.dsp5-archi-o22a-15m-g3.fr"
minio_s3_hostname: "restic.dsp5-archi-o22a-15m-g3.fr"
minio_buckets:
  - vdev
  - vpreprod
  - vprod
  - vdev-restic
  - vpreprod-restic
  - vprod-restic

# Registre Docker : avec Traefik en HTTPS sur harbor_hostname, le pull/push utilise le port 443 (plus besoin d’insecure).
# Décommenter uniquement si vous forcez encore docker login sur le port HTTP direct (harbor_http_port) :
# docker_insecure_registries:
#   - "{{ harbor_hostname }}:{{ harbor_http_port }}"
docker_insecure_registries: []

# --- Harbor ---
harbor_install: true
harbor_version: "2.10.2"
harbor_hostname: "harbor.dsp5-archi-o22a-15m-g3.fr"
harbor_admin_password: "thetiptop"
harbor_db_password: "thetiptop"
harbor_data_volume: "/opt/harbor/data"
harbor_http_port: 8080
harbor_https_port: 8443
harbor_enable_https: false
# HTTPS public derrière Traefik (:443), sans port — évite les redirections 308 vers :8443 (vide = désactivé)
harbor_external_url: ""

# --- Restic (bucket MinIO + préfixe S3) ---
# Planning des sauvegardes : rôle restic_client (mercredi 13h30, vendredi 12h00 par défaut).
# Les heures suivent le fuseau du VPS (voir timedatectl) ; surcharger restic_cron_schedule dans ce fichier si besoin.
restic_install: true
restic_version: "0.16.4"
restic_password: "thetiptop"
# Restic : un dépôt par environnement (bucket dédié).
# Sur le VPS (cron) : loopback OK. Depuis l’extérieur ou HTTPS public :
#   s3:https://restic.dsp5-archi-o22a-15m-g3.fr/vdev-restic
restic_repository: "s3:http://127.0.0.1:9000/vdev-restic"






