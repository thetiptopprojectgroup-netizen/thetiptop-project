---
- name: Pare-feu UFW
  when: firewall_enabled | default(false)
  block:
    - name: Installer ufw
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Autoriser les ports TCP
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ firewall_allowed_tcp_ports }}"

    - name: Activer UFW (refus entrant par défaut)
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming
