---
- name: Répertoire Traefik
  ansible.builtin.file:
    path: "{{ traefik_install_dir }}"
    state: directory
    mode: "0755"

- name: Répertoire configuration dynamique Traefik
  ansible.builtin.file:
    path: "{{ traefik_install_dir }}/dynamic"
    state: directory
    mode: "0755"

- name: Route Harbor via fichier (provider file)
  ansible.builtin.template:
    src: dynamic/harbor.yml.j2
    dest: "{{ traefik_install_dir }}/dynamic/harbor.yml"
    mode: "0644"
  when: traefik_harbor_hostname | default('') | length > 0

- name: Déployer docker-compose Traefik
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_install_dir }}/docker-compose.yml"
    mode: "0644"

- name: Lancer Traefik (docker compose)
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_install_dir }}"
    state: present
    pull: always
