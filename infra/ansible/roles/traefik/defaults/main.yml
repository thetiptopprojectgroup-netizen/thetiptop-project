---
traefik_install_dir: /opt/thetiptop/traefik
# v3.3.x peut encore négocier une API Docker trop basse avec Engine récent → erreur « client version 1.24 ».
# v3.4+ + DOCKER_API_VERSION corrigent en général le provider Docker.
traefik_image: traefik:v3.4
traefik_docker_api_version: "1.44"
# Si non vide : fichier dynamic/harbor.yml (provider file) — fonctionne même si le provider Docker échoue (API Engine).
traefik_harbor_hostname: ""
traefik_harbor_backend: "nginx"
traefik_acme_email: admin@example.com
traefik_dashboard_enabled: false
