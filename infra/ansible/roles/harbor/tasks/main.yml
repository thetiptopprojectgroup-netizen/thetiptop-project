---
- name: Paquets pour Harbor
  ansible.builtin.apt:
    name:
      - openssl
    state: present

- name: Télécharger l'installeur Harbor (offline)
  ansible.builtin.get_url:
    url: "https://github.com/goharbor/harbor/releases/download/v{{ harbor_version }}/harbor-offline-installer-v{{ harbor_version }}.tgz"
    dest: "/tmp/harbor-offline-installer-v{{ harbor_version }}.tgz"
    mode: "0644"
  when: harbor_install | default(true)

- name: Extraire Harbor
  ansible.builtin.unarchive:
    src: "/tmp/harbor-offline-installer-v{{ harbor_version }}.tgz"
    dest: /opt
    remote_src: true
    creates: /opt/harbor/install.sh
  when: harbor_install | default(true)

- name: Configurer harbor.yml
  ansible.builtin.template:
    src: harbor.yml.j2
    dest: /opt/harbor/harbor.yml
    mode: "0644"
  register: harbor_cfg
  when: harbor_install | default(true)

- name: Vérifier si Harbor est déjà installé
  ansible.builtin.stat:
    path: /opt/harbor/docker-compose.yml
  register: harbor_dc
  when: harbor_install | default(true)

- name: Installer ou mettre à jour Harbor (install.sh)
  ansible.builtin.command:
    cmd: ./install.sh
    chdir: /opt/harbor
  when:
    - harbor_install | default(true)
    - harbor_cfg.changed | default(false) or not harbor_dc.stat.exists | default(false)
