---
- name: Répertoire MinIO (compose)
  ansible.builtin.file:
    path: /opt/thetiptop/minio
    state: directory
    mode: "0755"

- name: Répertoire données MinIO
  ansible.builtin.file:
    path: "{{ minio_data_path }}"
    state: directory
    mode: "0755"

- name: Déployer docker-compose MinIO
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/thetiptop/minio/docker-compose.yml
    mode: "0644"

- name: Lancer MinIO
  community.docker.docker_compose_v2:
    project_src: /opt/thetiptop/minio
    state: present
    pull: always

- name: Attendre l'API MinIO (port 9000)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 9000
    delay: 5
    timeout: 120
