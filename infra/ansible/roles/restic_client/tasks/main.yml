---
- name: Paquets pour Restic
  ansible.builtin.apt:
    name:
      - bzip2
      - mongodb-database-tools
    state: present
  when: restic_install | default(true)

- name: Télécharger Restic
  ansible.builtin.get_url:
    url: "https://github.com/restic/restic/releases/download/v{{ restic_version }}/restic_{{ restic_version }}_linux_amd64.bz2"
    dest: "/tmp/restic_{{ restic_version }}_linux_amd64.bz2"
    mode: "0644"
  when: restic_install | default(true)

- name: Installer le binaire Restic
  ansible.builtin.shell: |
    set -e
    bunzip2 -c "/tmp/restic_{{ restic_version }}_linux_amd64.bz2" > /usr/local/bin/restic
    chmod 755 /usr/local/bin/restic
  args:
    creates: /usr/local/bin/restic
  when: restic_install | default(true)

- name: Répertoire scripts de sauvegarde
  ansible.builtin.file:
    path: /opt/thetiptop/restic
    state: directory
    mode: "0755"
  when: restic_install | default(true)

- name: Liste des dépôts Restic (plusieurs buckets MinIO sur le même VPS)
  ansible.builtin.set_fact:
    restic_repo_list: >-
      {{
        (
          (restic_repositories | default([]))
          if (restic_repositories | default([]) | length > 0)
          else ([restic_repository | default('')])
        ) | reject('equalto', '') | list
      }}
  when: restic_install | default(true)

- name: Au moins un dépôt Restic requis
  ansible.builtin.assert:
    that:
      - restic_repo_list | length > 0
    fail_msg: "Définir restic_repositories (liste d’URLs s3:…) ou restic_repository dans group_vars."
  when: restic_install | default(true)

- name: Assez de dépôts pour les indices cron (repo_index)
  ansible.builtin.assert:
    that:
      - restic_repo_list | length > (restic_cron_jobs | map(attribute='repo_index') | max | default(-1))
      - restic_cron_jobs | map(attribute='env_file') | list | length == restic_cron_jobs | length
      - restic_cron_jobs | map(attribute='env_name') | list | length == restic_cron_jobs | length
    fail_msg: "restic_repositories est trop court pour restic_cron_jobs (vérifier l’ordre vdev, vpreprod, vprod)."
  when: restic_install | default(true)

- name: Script de sauvegarde (cron) — tous les dépôts
  ansible.builtin.template:
    src: restic-backup.sh.j2
    dest: /opt/thetiptop/restic/backup.sh
    mode: "0750"
  when: restic_install | default(true)

- name: Script sauvegarde un seul dépôt (argument = URL, appelé par cron)
  ansible.builtin.template:
    src: restic-backup-repo.sh.j2
    dest: /opt/thetiptop/restic/backup-repo.sh
    mode: "0750"
  when: restic_install | default(true)

- name: Script d’initialisation multi-dépôts
  ansible.builtin.template:
    src: restic-init-all.sh.j2
    dest: /opt/thetiptop/restic/init-all.sh
    mode: "0750"
  when: restic_install | default(true)

- name: Initialiser chaque bucket Restic si vide
  ansible.builtin.command: /opt/thetiptop/restic/init-all.sh
  when: restic_install | default(true)
  changed_when: false

- name: Variables d’environnement communes Restic / S3 (sans RESTIC_REPOSITORY)
  ansible.builtin.set_fact:
    restic_env_base:
      RESTIC_PASSWORD: "{{ restic_password }}"
      AWS_ACCESS_KEY_ID: "{{ minio_root_user }}"
      AWS_SECRET_ACCESS_KEY: "{{ minio_root_password }}"
      AWS_DEFAULT_REGION: "{{ restic_aws_default_region | default('us-east-1') }}"
  when: restic_install | default(true)

- name: Retirer l’ancien cron Restic quotidien (remplacé par le planning hebdomadaire)
  ansible.builtin.cron:
    name: thetiptop restic backup
    state: absent
  when: restic_install | default(true)

- name: Retirer anciens crons Restic (noms / planning obsolètes)
  ansible.builtin.cron:
    name: "{{ item }}"
    state: absent
  loop:
    - thetiptop restic backup mercredi 13h30
    - thetiptop restic backup vendredi 12h00
    - thetiptop restic backup mercredi
    - thetiptop restic backup vendredi
  when: restic_install | default(true)

- name: Cron sauvegardes Restic (mercredi — un créneau par environnement)
  ansible.builtin.cron:
    name: "{{ item.name }}"
    minute: "{{ item.minute }}"
    hour: "{{ item.hour }}"
    weekday: "{{ item.weekday }}"
    job: "/opt/thetiptop/restic/backup-repo.sh {{ restic_repo_list[item.repo_index] }} {{ item.env_file }} {{ item.env_name }} >> /var/log/thetiptop-restic.log 2>&1"
    user: root
  loop: "{{ restic_cron_jobs }}"
  when: restic_install | default(true)

- name: Contrôle — chaque dépôt répond (snapshots)
  ansible.builtin.command: /usr/local/bin/restic snapshots
  environment: "{{ restic_env_base | combine({'RESTIC_REPOSITORY': item}) }}"
  loop: "{{ restic_repo_list }}"
  changed_when: false
  when: restic_install | default(true)

- name: Snapshot de contrôle (léger) par dépôt — écriture MinIO
  ansible.builtin.command: /usr/local/bin/restic backup /opt/thetiptop/restic --tag ansible-ci-smoke
  environment: "{{ restic_env_base | combine({'RESTIC_REPOSITORY': item}) }}"
  loop: "{{ restic_repo_list }}"
  when: restic_install | default(true)
