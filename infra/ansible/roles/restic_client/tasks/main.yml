---
- name: Paquets pour Restic
  ansible.builtin.apt:
    name:
      - bzip2
    state: present
  when: restic_install | default(true)

- name: Télécharger Restic
  ansible.builtin.get_url:
    url: "https://github.com/restic/restic/releases/download/v{{ restic_version }}/restic_{{ restic_version }}_linux_amd64.bz2"
    dest: "/tmp/restic_{{ restic_version }}_linux_amd64.bz2"
    mode: "0644"
  when: restic_install | default(true)

- name: Installer le binaire Restic
  ansible.builtin.shell: |
    set -e
    bunzip2 -c "/tmp/restic_{{ restic_version }}_linux_amd64.bz2" > /usr/local/bin/restic
    chmod 755 /usr/local/bin/restic
  args:
    creates: /usr/local/bin/restic
  when: restic_install | default(true)

- name: Répertoire scripts de sauvegarde
  ansible.builtin.file:
    path: /opt/thetiptop/restic
    state: directory
    mode: "0755"
  when: restic_install | default(true)

- name: Script de sauvegarde (cron)
  ansible.builtin.template:
    src: restic-backup.sh.j2
    dest: /opt/thetiptop/restic/backup.sh
    mode: "0750"
  when: restic_install | default(true)

- name: Variables d’environnement Restic / S3 (pour init et checks)
  ansible.builtin.set_fact:
    restic_env:
      RESTIC_REPOSITORY: "{{ restic_repository }}"
      RESTIC_PASSWORD: "{{ restic_password }}"
      AWS_ACCESS_KEY_ID: "{{ minio_root_user }}"
      AWS_SECRET_ACCESS_KEY: "{{ minio_root_password }}"
      AWS_DEFAULT_REGION: "{{ restic_aws_default_region | default('us-east-1') }}"
  when: restic_install | default(true)

- name: Tester l’accès au dépôt Restic (snapshots)
  ansible.builtin.command: /usr/local/bin/restic snapshots
  environment: "{{ restic_env }}"
  register: restic_snapshots_check
  failed_when: false
  changed_when: false
  when: restic_install | default(true)

- name: Initialiser le dépôt Restic dans MinIO (obligatoire avant le 1er backup)
  ansible.builtin.command: /usr/local/bin/restic init
  environment: "{{ restic_env }}"
  register: restic_init
  changed_when: restic_init.rc == 0
  failed_when: >-
    restic_init.rc != 0 and
    ('already initialized' not in ((restic_init.stderr | default('') + restic_init.stdout | default('')) | lower))
  when: restic_install | default(true) and restic_snapshots_check.rc != 0

- name: Retirer l’ancien cron Restic quotidien (remplacé par le planning hebdomadaire)
  ansible.builtin.cron:
    name: thetiptop restic backup
    state: absent
  when: restic_install | default(true)

- name: Retirer anciens crons Restic avec heure dans le nom (remplacés par noms stables)
  ansible.builtin.cron:
    name: "{{ item }}"
    state: absent
  loop:
    - thetiptop restic backup mercredi 13h30
    - thetiptop restic backup vendredi 12h00
  when: restic_install | default(true)

- name: Cron sauvegardes Restic (planning hebdomadaire)
  ansible.builtin.cron:
    name: "{{ item.name }}"
    minute: "{{ item.minute }}"
    hour: "{{ item.hour }}"
    weekday: "{{ item.weekday }}"
    job: /opt/thetiptop/restic/backup.sh >> /var/log/thetiptop-restic.log 2>&1
    user: root
  loop: "{{ restic_cron_schedule }}"
  when: restic_install | default(true)

- name: Contrôle final — dépôt Restic joignable (échoue le CD si MinIO / mots de passe / bucket sont incorrects)
  ansible.builtin.command: /usr/local/bin/restic snapshots
  environment: "{{ restic_env }}"
  changed_when: false
  when: restic_install | default(true)

- name: Snapshot de contrôle (léger) — confirme l’écriture réelle dans le bucket MinIO
  ansible.builtin.command: /usr/local/bin/restic backup /opt/thetiptop/restic --tag ansible-ci-smoke
  environment: "{{ restic_env }}"
  when: restic_install | default(true)
