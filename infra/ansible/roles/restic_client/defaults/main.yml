---
# Région factice exigée par la signature AWS S3 vers MinIO (sinon restic peut échouer).
restic_aws_default_region: us-east-1

# Horaires au fuseau du serveur (crontab système). Pour l’heure de Paris, réglez le VPS sur
# Europe/Paris (timedatectl) ou adaptez les heures ci‑dessous en UTC.
restic_cron_schedule:
  - name: thetiptop restic backup mercredi
    minute: "40"
    hour: "14"
    weekday: wed
  - name: thetiptop restic backup vendredi
    minute: "0"
    hour: "12"
    weekday: fri
