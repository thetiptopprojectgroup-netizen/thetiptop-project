---
# Docker CE + plugin Compose (Ubuntu / Debian)
- name: Définir le nom de distribution pour le dépôt Docker (Debian/Ubuntu)
  ansible.builtin.set_fact:
    docker_apt_distro: "{{ 'debian' if ansible_distribution == 'Debian' else 'ubuntu' }}"
    docker_apt_release: "{{ ansible_distribution_release }}"

- name: Installer dépendances apt
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Créer le répertoire des clés APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Télécharger la clé GPG Docker
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ docker_apt_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Ajouter le dépôt Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ docker_apt_distro }} {{ docker_apt_release }} stable"
    state: present
    filename: docker
    update_cache: true

- name: Installer Docker Engine et Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Démarrer Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Ajouter l'utilisateur de déploiement au groupe docker (si défini)
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true
  when: deploy_user is defined and deploy_user | length > 0
