---
- name: Paquets de base pour Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Clé GPG du dépôt Docker
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Dépôt Docker (apt)
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Installer Docker Engine et Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Répertoire configuration Docker
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Registres Docker non sécurisés (ex. Harbor en HTTP)
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  when: docker_insecure_registries | default([]) | length > 0
  notify: Redémarrer Docker

- name: Supprimer daemon.json si aucun registre insecure (Harbor en HTTPS)
  ansible.builtin.file:
    path: /etc/docker/daemon.json
    state: absent
  when: docker_insecure_registries | default([]) | length == 0
  notify: Redémarrer Docker

- name: Démarrer et activer le service Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Appliquer redémarrage Docker si nécessaire
  ansible.builtin.meta: flush_handlers

- name: Ajouter l'utilisateur de déploiement au groupe docker
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true
  when: deploy_user | default('') | length > 0
