---
# Provision complète : Docker, UFW, Traefik, MinIO, Harbor, Restic
# Usage : ansible-galaxy collection install -r requirements.yml
#         ansible-playbook playbooks/site.yml -i inventory/hosts.yml

- name: Provision VPS TheTipTop (infra)
  hosts: vps
  become: true
  roles:
    - role: docker
    - role: firewall
    - role: traefik_network
    - role: traefik
    - role: minio
    - role: harbor
    - role: restic_client
