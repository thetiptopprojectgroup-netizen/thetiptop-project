---
# Provision complète : Docker, UFW, Traefik, MinIO, Harbor, Restic
# Lancer depuis ce répertoire : ansible-playbook site.yml -i inventory/hosts.yml
# (Les playbooks sont à la racine d'ansible/ pour que le dossier roles/ soit trouvé.)

- name: Provision VPS TheTipTop (infra)
  hosts: vps
  become: true
  roles:
    - role: docker
    - role: firewall
    - role: traefik_network
    - role: traefik
    - role: minio
    - role: harbor
    - role: restic_client
