---
# Copier vers hosts.yml et adapter.
#
# Erreur « Permission denied (publickey,password) » :
# 1) Utilisateur : souvent pas « root » sur Ubuntu cloud (essayez « ubuntu » ou « debian »).
# 2) Clé SSH : sous WSL, la clé doit être dans ~/.ssh (copier depuis Windows si besoin).
#    Décommentez et adaptez ansible_ssh_private_key_file.
# 3) Sur le VPS : la clé PUBLIQUE doit être dans ~/.ssh/authorized_keys du compte utilisé.
# 4) Tester : ssh -i ~/.ssh/votre_cle ubuntu@212.227.82.68

all:
  children:
    vps:
      hosts:
        thetiptop-vps:
          ansible_host: "212.227.82.68"
          # Utilisateur avec lequel vous vous connectez en SSH (pas forcément root)
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ansible_python_interpreter: /usr/bin/python3
          # Si vous utilisez un utilisateur non-root avec sudo sans mot de passe :
          # ansible_user: ubuntu
          # ansible_become: true
          # ansible_become_method: sudo
