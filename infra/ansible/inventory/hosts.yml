---
# Copier vers hosts.yml et adapter.
# SSH : même clé privée que pour le CD GitHub (secret VPS_SSH_KEY), ou agent ssh-add.
# Sans clé → Permission denied (publickey).
#
# Si tu lances Ansible **sur le VPS** : utiliser hosts.local.yml (connexion locale, pas SSH vers soi-même).
all:
  children:
    vps:
      hosts:
        thetiptop-vps:
          ansible_host: "212.227.82.68"
          ansible_user: root
          # Décommenter et mettre le chemin de la clé (souvent la même que le secret VPS_SSH_KEY) :
          # ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ansible_python_interpreter: /usr/bin/python3
