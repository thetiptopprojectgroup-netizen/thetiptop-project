# Stack observabilité : Prometheus + Grafana + node-exporter + cAdvisor.
# Prérequis : réseau Docker « traefik », certresolver « le », DNS vers le VPS.
# Déploiement : infra/deploy/apply-monitoring-from-app.sh (CD) ou :
#   cd infra/monitoring && cp .env.example .env && éditer .env && docker compose up -d
#
# cAdvisor expose les métriques de tous les conteneurs ; les stacks applicatives sont distinguées
# par container_label_com_docker_compose_project (ex. thetiptop-vdev, thetiptop-vpreprod, thetiptop-vprod).

services:
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: thetiptop-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_net
      - traefik

  grafana:
    image: grafana/grafana:11.3.0
    container_name: thetiptop-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}/
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitoring_net
      - traefik

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: thetiptop-node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring_net
    pid: host

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: thetiptop-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring_net

networks:
  monitoring_net:
    driver: bridge
  traefik:
    external: true

volumes:
  prometheus_data:
  grafana_data:
