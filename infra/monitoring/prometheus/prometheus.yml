# Prometheus — métriques host (node-exporter) + conteneurs (cAdvisor).
# Les stacks vdev / vpreprod / vprod ont chacune un COMPOSE_PROJECT_NAME distinct
# (ex. thetiptop-vdev) : dans Grafana, filtrer sur
#   container_label_com_docker_compose_project
# ou sur le nom du conteneur.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
        labels:
          instance: vps

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
        labels:
          stack: docker

  - job_name: thetiptop-api
    metrics_path: /metrics
    static_configs:
      - targets: [api:5000]
        labels:
          service: thetiptop-api
