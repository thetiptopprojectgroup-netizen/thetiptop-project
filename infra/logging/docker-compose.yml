# ELK stack: Elasticsearch + Kibana + Filebeat.
# Kibana accessible via Traefik (file provider: infra/vps/traefik/dynamic/logging.yml).
# Deploy: bash infra/deploy/apply-logging-from-app.sh /opt/thetiptop/app

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: thetiptop-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=thetiptop-es
      - cluster.name=thetiptop-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ingest.geoip.downloader.enabled=false
      - xpack.ml.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - logging_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -u elastic:$$ELASTIC_PASSWORD http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null",
        ]
      interval: 15s
      timeout: 15s
      retries: 30
      start_period: 120s

  setup-users:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: thetiptop-elastic-setup
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-${ELASTIC_PASSWORD}}
      - KIBANA_ADMIN_USER=${KIBANA_USERNAME:-admin}
      - KIBANA_ADMIN_PASSWORD=${KIBANA_PASSWORD:-${ELASTIC_PASSWORD}}
    networks:
      - logging_net
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Setting kibana_system password..."
        until curl -sf -u "elastic:$${ELASTIC_PASSWORD}" http://elasticsearch:9200 >/dev/null 2>&1; do sleep 2; done
        curl -sf -u "elastic:$${ELASTIC_PASSWORD}" -X POST http://elasticsearch:9200/_security/user/kibana_system/_password \
          -H "Content-Type: application/json" -d "{\"password\":\"$${KIBANA_SYSTEM_PASSWORD}\"}"
        echo ""
        echo "Creating/updating admin user '$${KIBANA_ADMIN_USER}'..."
        curl -sf -u "elastic:$${ELASTIC_PASSWORD}" -X PUT "http://elasticsearch:9200/_security/user/$${KIBANA_ADMIN_USER}" \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"$${KIBANA_ADMIN_PASSWORD}\",\"roles\":[\"superuser\"],\"full_name\":\"Kibana Admin\"}"
        echo ""
        echo "Users ready."

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: thetiptop-kibana
    restart: unless-stopped
    depends_on:
      setup-users:
        condition: service_completed_successfully
    environment:
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_PUBLICBASEURL=https://${KIBANA_HOST:-kibana.dsp5-archi-o22a-15m-g3.fr}/
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-${ELASTIC_PASSWORD}}
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - logging_net
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5601/api/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    container_name: thetiptop-filebeat
    restart: unless-stopped
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - logging_net
    command: filebeat -e -strict.perms=false

networks:
  logging_net:
    driver: bridge
  traefik:
    external: true

volumes:
  es_data:
  kibana_data:
  filebeat_data:
