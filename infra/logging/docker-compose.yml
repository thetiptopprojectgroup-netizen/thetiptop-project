# Stack logs : Elasticsearch + Kibana + Filebeat (logs conteneurs Docker).
# Les stacks applicatives sont distinguées par le label com_docker.compose.project
# (ex. thetiptop-vdev, thetiptop-vpreprod, thetiptop-vprod) — filtre dans Kibana Discover.
# Prérequis : réseau Docker « traefik », DNS, vm.max_map_count ≥ 262144 sur l’hôte (souvent déjà OK).
# Déploiement : infra/deploy/apply-logging-from-app.sh (CD).

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: thetiptop-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=thetiptop-es
      - cluster.name=thetiptop-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ingest.geoip.downloader.enabled=false
      - xpack.ml.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - logging_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -u elastic:${ELASTIC_PASSWORD} 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null",
        ]
      interval: 15s
      timeout: 15s
      retries: 25
      start_period: 120s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: thetiptop-kibana
    restart: unless-stopped
    # service_started : évite un blocage si le healthcheck ES est capricieux (petit VPS).
    # Kibana retente la connexion à Elasticsearch au démarrage.
    depends_on:
      elasticsearch:
        condition: service_started
      elastic-bootstrap:
        condition: service_completed_successfully
    environment:
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_PUBLICBASEURL=https://${KIBANA_HOST}/
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # Kibana backend should use the built-in elastic superuser for startup reliability.
      # The custom `admin` user is for interactive login only.
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - logging_net
      - traefik
    # Ne pas dépendre du JSON exact de /api/status (varie selon la version).
    healthcheck:
      # Pas de -f : Kibana peut répondre 401 sur /api/status sans session ; l’important est que le port réponde.
      test:
        [
          "CMD-SHELL",
          "curl -s --max-time 5 http://127.0.0.1:5601/api/status -o /dev/null",
        ]
      interval: 20s
      timeout: 15s
      retries: 25
      start_period: 300s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.kibana-logging.rule=Host(`${KIBANA_HOST:?set KIBANA_HOST in .env}`)"
      - traefik.http.routers.kibana-logging.entrypoints=websecure
      - traefik.http.routers.kibana-logging.tls=true
      - traefik.http.routers.kibana-logging.tls.certresolver=le
      - traefik.http.routers.kibana-logging.priority=30
      - traefik.http.routers.kibana-logging.service=kibana-logging
      - traefik.http.services.kibana-logging.loadbalancer.server.port=5601

  elastic-bootstrap:
    image: curlimages/curl:8.12.1
    container_name: thetiptop-elastic-bootstrap
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
      - KIBANA_USERNAME=${KIBANA_USERNAME:-admin}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD:-}
    networks:
      - logging_net
    command:
      - sh
      - -ec
      - |
        echo "Create/update Kibana admin user '${KIBANA_USERNAME}'..."
        curl -sS -u "elastic:${ELASTIC_PASSWORD}" \
          -H "Content-Type: application/json" \
          -X PUT "http://elasticsearch:9200/_security/user/${KIBANA_USERNAME}" \
          -d "{\"password\":\"${KIBANA_PASSWORD}\",\"roles\":[\"superuser\"],\"full_name\":\"Kibana Admin\"}" >/dev/null
        echo "Kibana admin user ready."

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    container_name: thetiptop-filebeat
    restart: unless-stopped
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - logging_net
    command: filebeat -e -strict.perms=false

networks:
  logging_net:
    driver: bridge
  traefik:
    external: true

volumes:
  es_data:
  kibana_data:
  filebeat_data:
