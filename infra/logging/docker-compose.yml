# Stack logs : Elasticsearch + Kibana + Filebeat (logs conteneurs Docker).
# Les stacks applicatives sont distinguées par le label com_docker.compose.project
# (ex. thetiptop-vdev, thetiptop-vpreprod, thetiptop-vprod) — filtre dans Kibana Discover.
# Prérequis : réseau Docker « traefik », DNS, vm.max_map_count ≥ 262144 sur l’hôte (souvent déjà OK).
# Déploiement : infra/deploy/apply-logging-from-app.sh (CD).

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: thetiptop-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=thetiptop-es
      - cluster.name=thetiptop-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ingest.geoip.downloader.enabled=false
      - xpack.ml.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - logging_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -u elastic:${ELASTIC_PASSWORD} 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null",
        ]
      interval: 15s
      timeout: 15s
      retries: 25
      start_period: 120s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: thetiptop-kibana
    restart: unless-stopped
    # service_started : évite un blocage si le healthcheck ES est capricieux (petit VPS).
    # Kibana retente la connexion à Elasticsearch au démarrage.
    depends_on:
      elasticsearch:
        condition: service_started
      elastic-bootstrap:
        condition: service_completed_successfully
    environment:
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_PUBLICBASEURL=https://${KIBANA_HOST}/
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # Kibana 8.x forbids using `elastic` as backend user.
      # Use `kibana_system` for Kibana internals; keep `admin` for interactive login.
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD:?set KIBANA_SYSTEM_PASSWORD in .env}
    volumes:
      - kibana_data:/usr/share/kibana/data
    ports:
      # Bind local-only host port to give Traefik a deterministic backend target.
      - "127.0.0.1:15601:5601"
    networks:
      - logging_net
      - traefik
    # Ne pas dépendre du JSON exact de /api/status (varie selon la version).
    healthcheck:
      # Pas de -f : Kibana peut répondre 401 sur /api/status sans session ; l’important est que le port réponde.
      test:
        [
          "CMD-SHELL",
          "curl -s --max-time 5 http://127.0.0.1:5601/api/status -o /dev/null",
        ]
      interval: 20s
      timeout: 15s
      retries: 25
      start_period: 300s
  elastic-bootstrap:
    image: curlimages/curl:8.12.1
    container_name: thetiptop-elastic-bootstrap
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD:?set KIBANA_SYSTEM_PASSWORD in .env}
      - KIBANA_USERNAME=${KIBANA_USERNAME:-admin}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD:-}
    networks:
      - logging_net
    command:
      - sh
      - -ec
      - |
        echo "Bootstrap Elasticsearch users for Kibana..."
        SYS_PASSWORD="$${KIBANA_SYSTEM_PASSWORD:-$${ELASTIC_PASSWORD}}"
        ADMIN_PASSWORD="$${KIBANA_PASSWORD:-$${ELASTIC_PASSWORD}}"
        CODE_SYS=""
        for attempt in $$(seq 1 20); do
          CODE_SYS="$$(curl -sS -o /tmp/es_kibana_system_resp.json -w '%{http_code}' -u "elastic:${ELASTIC_PASSWORD}" \
            -H "Content-Type: application/json" \
            -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password" \
            -d "{\"password\":\"$${SYS_PASSWORD}\"}" || true)"
          if [ "$${CODE_SYS}" = "200" ]; then
            break
          fi
          sleep 3
        done
        if [ "$${CODE_SYS}" != "200" ]; then
          echo "ERROR: failed to set kibana_system password (HTTP $${CODE_SYS})."
          cat /tmp/es_kibana_system_resp.json || true
          exit 1
        fi

        CODE_ADMIN=""
        for attempt in $$(seq 1 20); do
          CODE_ADMIN="$$(curl -sS -o /tmp/es_admin_resp.json -w '%{http_code}' -u "elastic:${ELASTIC_PASSWORD}" \
            -H "Content-Type: application/json" \
            -X PUT "http://elasticsearch:9200/_security/user/$${KIBANA_USERNAME}" \
            -d "{\"password\":\"$${ADMIN_PASSWORD}\",\"roles\":[\"superuser\"],\"full_name\":\"Kibana Admin\"}" || true)"
          if [ "$${CODE_ADMIN}" = "200" ] || [ "$${CODE_ADMIN}" = "201" ]; then
            break
          fi
          sleep 3
        done
        if [ "$${CODE_ADMIN}" != "200" ] && [ "$${CODE_ADMIN}" != "201" ]; then
          echo "ERROR: failed to create/update admin user (HTTP $${CODE_ADMIN})."
          cat /tmp/es_admin_resp.json || true
          exit 1
        fi
        echo "Users ready: kibana_system and $${KIBANA_USERNAME}"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    container_name: thetiptop-filebeat
    restart: unless-stopped
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - logging_net
    command: filebeat -e -strict.perms=false

networks:
  logging_net:
    driver: bridge
  traefik:
    external: true

volumes:
  es_data:
  kibana_data:
  filebeat_data:
