# Stack logs : Elasticsearch + Kibana + Filebeat (logs conteneurs Docker).
# Les stacks applicatives sont distinguées par le label com_docker.compose.project
# (ex. thetiptop-vdev, thetiptop-vpreprod, thetiptop-vprod) — filtre dans Kibana Discover.
# Prérequis : réseau Docker « traefik », DNS, vm.max_map_count ≥ 262144 sur l’hôte (souvent déjà OK).
# Déploiement : infra/deploy/apply-logging-from-app.sh (CD).

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: thetiptop-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=thetiptop-es
      - cluster.name=thetiptop-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ingest.geoip.downloader.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - logging_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -u elastic:${ELASTIC_PASSWORD} 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s'",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: thetiptop-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_PUBLICBASEURL=https://${KIBANA_HOST}/
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - logging_net
      - traefik
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -u elastic:${ELASTIC_PASSWORD} http://127.0.0.1:5601/api/status | grep -q '\"level\":\"available\"'",
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    container_name: thetiptop-filebeat
    restart: unless-stopped
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?set ELASTIC_PASSWORD in .env}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - logging_net
    command: filebeat -e -strict.perms=false

networks:
  logging_net:
    driver: bridge
  traefik:
    external: true

volumes:
  es_data:
  kibana_data:
  filebeat_data:
